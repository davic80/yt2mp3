name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: davic80/yt2mp3

jobs:
  # ── Job 1: Build & Push ──────────────────────────────────────────────────────
  build-push:
    name: Build multi-arch image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,prefix=,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: GitHub Release (only on version tags) ─────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract block between ## [X.Y.Z] and the next ## [
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Store as multiline output
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compose release body
        id: body
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIGEST="${{ needs.build-push.outputs.digest }}"
          {
            echo "body<<EOF"
            echo "## Cambios en v${VERSION}"
            echo ""
            echo "${{ steps.changelog.outputs.notes }}"
            echo ""
            echo "---"
            echo ""
            echo "## Docker"
            echo ""
            echo '```'
            echo "docker pull ghcr.io/davic80/yt2mp3:${VERSION}"
            echo '```'
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Imagen** | \`ghcr.io/davic80/yt2mp3:${VERSION}\` |"
            echo "| **Tags** | \`${VERSION}\`, \`latest\` |"
            echo "| **Plataformas** | \`linux/amd64\`, \`linux/arm64\` |"
            echo "| **Digest** | \`${DIGEST}\` |"
            echo ""
            echo "### Desplegar en Raspberry Pi"
            echo '```bash'
            echo "# Actualizar a esta versión"
            echo "docker compose pull && docker compose up -d"
            echo ""
            echo "# O fijar esta versión concreta en .env"
            echo "IMAGE_TAG=${VERSION} docker compose up -d"
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.body.outputs.body }}" \
            --verify-tag
