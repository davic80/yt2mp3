<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yt2mp3 · usuarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1c1c1c; --surface: #222; --surface2: #2a2a2a;
      --border: #333; --border2: #3a3a3a;
      --neon: #39FF14; --neon-dim: rgba(57,255,20,.15);
      --text: #e0e0e0; --muted: #777; --muted2: #aaa;
      --radius: 6px; --font: 'Inter', system-ui, sans-serif;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 14px; min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: .75rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10; gap: 1rem; flex-wrap: wrap;
    }
    .topbar-logo { font-size: 1.1rem; font-weight: 600; letter-spacing: -.5px; }
    .topbar-logo .sep   { color: #27a008; }
    .topbar-logo .mp3   { color: var(--neon); }
    .topbar-logo .label { font-size: .7rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-left: .5rem; }
    .topbar-nav { display: flex; gap: .5rem; }
    .nav-link {
      font-size: .8rem; color: var(--muted2); text-decoration: none;
      padding: .25rem .6rem; border-radius: var(--radius);
      transition: color .12s, background .12s;
    }
    .nav-link:hover  { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--neon); background: var(--neon-dim); }

    /* ── Search bar ── */
    .toolbar {
      padding: 1rem 1.5rem .6rem;
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }
    .search-input {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: .35rem .7rem; font-size: .82rem;
      font-family: var(--font); width: 240px; outline: none;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--neon); }
    .search-input::placeholder { color: var(--muted); }
    .stat-pill {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 20px; padding: .2rem .75rem; font-size: .78rem; color: var(--muted);
      margin-left: auto;
    }
    .stat-pill span { color: var(--neon); font-weight: 600; }

    /* ── Create-user inline form ── */
    .create-user-form {
      padding: 0 1.5rem .6rem;
    }
    .create-user-toggle {
      background: none; border: 1px solid var(--neon); border-radius: var(--radius);
      color: var(--neon); font-family: var(--font); font-size: .78rem; font-weight: 600;
      padding: .3rem .8rem; cursor: pointer; transition: background .15s, color .15s;
    }
    .create-user-toggle:hover { background: var(--neon); color: #111; }
    .create-user-fields {
      display: none; margin-top: .6rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.2rem;
    }
    .create-user-fields.open { display: flex; flex-wrap: wrap; gap: .6rem; align-items: flex-end; }
    .cuf-group { display: flex; flex-direction: column; gap: .2rem; }
    .cuf-group label { font-size: .72rem; color: var(--muted); font-weight: 500; }
    .cuf-group input {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--radius); color: var(--text); font-family: var(--font);
      font-size: .82rem; padding: .35rem .6rem; outline: none; width: 180px;
      transition: border-color .15s;
    }
    .cuf-group input:focus { border-color: var(--neon); }
    .cuf-group input::placeholder { color: var(--muted); }
    .btn-create-user {
      background: var(--neon); color: #111; border: none; border-radius: var(--radius);
      font-family: var(--font); font-size: .82rem; font-weight: 600;
      padding: .4rem 1rem; cursor: pointer; transition: opacity .15s;
      height: fit-content;
    }
    .btn-create-user:hover { opacity: .85; }
    .btn-create-user:disabled { opacity: .4; cursor: not-allowed; }
    .cuf-error {
      width: 100%; font-size: .78rem; color: #ff4d4d; margin-top: .2rem;
      display: none;
    }
    .cuf-error.show { display: block; }

    /* ── Table ── */
    .table-wrap { padding: 0 1.5rem 2rem; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--bg); border-bottom: 1px solid var(--border);
      color: var(--muted); font-weight: 600; font-size: .71rem;
      text-transform: uppercase; letter-spacing: .05em;
      padding: .5rem .65rem; text-align: left;
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--neon); }
    thead th.sorted::after { content: ' ↓'; font-size: .65rem; }
    thead th.sorted.asc::after { content: ' ↑'; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--neon-dim); }
    td { padding: .55rem .65rem; vertical-align: middle; font-size: .83rem; }
    .td-email { font-size: .8rem; color: var(--muted2); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-name  { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-num   { text-align: right; color: var(--muted2); white-space: nowrap; }
    .td-num.highlight { color: var(--text); font-weight: 600; }
    .td-date  { font-size: .76rem; color: var(--muted); white-space: nowrap; }
    .td-feat  { text-align: center; }

    /* ── Toggle switch ── */
    .toggle-wrap { display: inline-flex; align-items: center; gap: .4rem; }
    .toggle {
      position: relative; display: inline-block; width: 34px; height: 18px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: var(--surface2);
      border-radius: 18px; cursor: pointer; border: 1px solid var(--border2);
      transition: background .2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--muted); bottom: 2px; left: 2px;
      transition: transform .2s, background .2s;
    }
    .toggle input:checked + .slider { background: var(--neon-dim); border-color: var(--neon); }
    .toggle input:checked + .slider::before { transform: translateX(16px); background: var(--neon); }
    .toggle-label { font-size: .72rem; color: var(--muted); }

    /* ── Empty / loading ── */
    .empty-msg { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: .9rem; }

    /* ── Delete button ── */
    .btn-delete-user {
      background: none; border: 1px solid var(--border2); border-radius: var(--radius);
      color: var(--muted); font-size: .72rem; padding: .2rem .5rem; cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
    }
    .btn-delete-user:hover { border-color: #ff4d4d; color: #ff4d4d; background: rgba(255,77,77,.08); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: .55rem 1rem;
      font-size: .82rem; color: var(--text);
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
      opacity: 0; transform: translateY(8px);
      transition: opacity .2s, transform .2s; pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    yt<span class="sep">/</span>2<span class="mp3">mp3</span>
    <span class="label">usuarios</span>
  </div>
  <nav class="topbar-nav">
    <a class="nav-link" href="/db">descargas</a>
    <a class="nav-link" href="/db/analytics">analíticas</a>
    <a class="nav-link active" href="/db/users">usuarios</a>
  </nav>
</div>

<div class="toolbar">
  <input class="search-input" type="search" id="search-input"
         placeholder="Buscar por email o nombre..."
         oninput="filterTable()" />
  <div class="stat-pill" id="user-count">
    <span id="stat-users">—</span> usuarios
  </div>
</div>

<div class="create-user-form">
  <button class="create-user-toggle" onclick="toggleCreateForm()">+ Crear usuario</button>
  <div class="create-user-fields" id="create-user-fields">
    <div class="cuf-group">
      <label for="cuf-name">Nombre *</label>
      <input type="text" id="cuf-name" placeholder="Juan Perez" />
    </div>
    <div class="cuf-group">
      <label for="cuf-email">Email (opcional)</label>
      <input type="email" id="cuf-email" placeholder="juan@local" />
    </div>
    <div class="cuf-group">
      <label for="cuf-pass">Password *</label>
      <input type="password" id="cuf-pass" placeholder="****" />
    </div>
    <button class="btn-create-user" id="btn-create-user" onclick="createUser()">Crear</button>
    <div class="cuf-error" id="cuf-error"></div>
  </div>
</div>

<div class="table-wrap">
  <div id="table-container">
    <div class="empty-msg">Cargando...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  let _users = [];
  let _sortCol = 'play_count';
  let _sortAsc  = false;

  async function load() {
    const res = await fetch('/db/api/users');
    _users = await res.json();
    document.getElementById('stat-users').textContent = _users.length;
    render();
  }

  function filterTable() {
    render();
  }

  function sortBy(col) {
    if (_sortCol === col) { _sortAsc = !_sortAsc; }
    else { _sortCol = col; _sortAsc = false; }
    render();
  }

  function render() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    let rows = _users.filter(u =>
      !q || u.email.toLowerCase().includes(q) || (u.name || '').toLowerCase().includes(q)
    );

    rows = rows.slice().sort((a, b) => {
      let av = a[_sortCol], bv = b[_sortCol];
      if (av == null) av = _sortAsc ? Infinity : -Infinity;
      if (bv == null) bv = _sortAsc ? Infinity : -Infinity;
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      return _sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });

    const cols = [
      { key: 'email',          label: 'Email' },
      { key: 'name',           label: 'Nombre' },
      { key: 'created_at',     label: 'Alta' },
      { key: 'track_count',    label: 'Canciones' },
      { key: 'play_count',     label: 'Plays' },
      { key: 'minutes_played', label: 'Minutos' },
      { key: 'last_play',      label: 'Último play' },
      { key: 'is_enabled',     label: 'Habilitado' },
      { key: 'is_admin',       label: 'Admin' },
      { key: 'lyrics_enabled', label: 'Lyrics' },
      { key: 'share_enabled',  label: 'Compartir' },
      { key: null,             label: '' },
    ];

    if (!rows.length) {
      document.getElementById('table-container').innerHTML =
        '<div class="empty-msg">Sin resultados.</div>';
      return;
    }

    document.getElementById('table-container').innerHTML = `
      <table>
        <thead>
          <tr>
            ${cols.map(c => c.key
              ? `<th class="${_sortCol === c.key ? 'sorted' + (_sortAsc ? ' asc' : '') : ''}"
                     onclick="sortBy('${c.key}')">${c.label}</th>`
              : `<th style="cursor:default"></th>`
            ).join('')}
          </tr>
        </thead>
        <tbody>
          ${rows.map(u => `
            <tr>
              <td class="td-email" title="${esc(u.email)}">${esc(u.email)}</td>
              <td class="td-name"  title="${esc(u.name)}">${esc(u.name) || '<span style="color:var(--muted)">—</span>'}</td>
              <td class="td-date">${fmtDate(u.created_at)}</td>
              <td class="td-num">${u.track_count}</td>
              <td class="td-num ${u.play_count > 0 ? 'highlight' : ''}">${u.play_count}</td>
              <td class="td-num ${u.minutes_played > 0 ? 'highlight' : ''}">${u.minutes_played > 0 ? u.minutes_played + ' min' : '—'}</td>
              <td class="td-date">${u.last_play ? fmtDate(u.last_play) : '<span style="color:var(--muted)">—</span>'}</td>
              <td class="td-feat">
                <label class="toggle" title="Habilitado ${u.is_enabled ? 'sí' : 'no'}">
                  <input type="checkbox" ${u.is_enabled ? 'checked' : ''}
                         onchange="toggleFeature('${esc(u.email)}', 'is_enabled', this)" />
                  <span class="slider"></span>
                </label>
              </td>
              <td class="td-feat">
                <label class="toggle" title="Admin ${u.is_admin ? 'sí' : 'no'}">
                  <input type="checkbox" ${u.is_admin ? 'checked' : ''}
                         onchange="toggleFeature('${esc(u.email)}', 'is_admin', this)" />
                  <span class="slider"></span>
                </label>
              </td>
              <td class="td-feat">
                <label class="toggle" title="Lyrics ${u.lyrics_enabled ? 'activadas' : 'desactivadas'}">
                  <input type="checkbox" ${u.lyrics_enabled ? 'checked' : ''}
                         onchange="toggleFeature('${esc(u.email)}', 'lyrics_enabled', this)" />
                  <span class="slider"></span>
                </label>
              </td>
              <td class="td-feat">
                <label class="toggle" title="Compartir ${u.share_enabled ? 'activado' : 'desactivado'}">
                  <input type="checkbox" ${u.share_enabled ? 'checked' : ''}
                         onchange="toggleFeature('${esc(u.email)}', 'share_enabled', this)" />
                  <span class="slider"></span>
                </label>
              </td>
              <td>
                <button class="btn-delete-user" onclick="deleteUser('${esc(u.email)}')" title="Eliminar usuario">✕</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  async function toggleFeature(email, feature, checkbox) {
    const enabled = checkbox.checked;
    try {
      const res = await fetch(`/db/api/users/${encodeURIComponent(email)}/features`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [feature]: enabled }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error('error');
      const u = _users.find(u => u.email === email);
      if (u) u[feature] = data[feature];
      const labels = { lyrics_enabled: 'Lyrics', share_enabled: 'Compartir', is_enabled: 'Habilitado', is_admin: 'Admin' };
      showToast(`${labels[feature] || feature} ${enabled ? 'activado' : 'desactivado'} para ${email}`);
    } catch (_) {
      checkbox.checked = !enabled;
      showToast('Error al guardar');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('es', { year: 'numeric', month: '2-digit', day: '2-digit' });
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.sortBy       = sortBy;
  window.filterTable  = filterTable;
  window.toggleFeature = toggleFeature;

  // ── Delete user ───────────────────────────────────────────────────────────
  window.deleteUser = async function (email) {
    if (!confirm(`¿Eliminar usuario "${email}"?\n\nSe borrarán sus playlists, features y historial de reproducción.\nSus descargas se conservarán como anónimas.`)) return;

    try {
      const res = await fetch(`/db/api/users/${encodeURIComponent(email)}`, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) {
        showToast(data.error || 'Error al eliminar usuario.');
        return;
      }
      showToast(`Usuario eliminado: ${email}`);
      load();
    } catch (_) {
      showToast('Error de conexión.');
    }
  };

  // ── Create user form ──────────────────────────────────────────────────────
  window.toggleCreateForm = function () {
    document.getElementById('create-user-fields').classList.toggle('open');
  };

  window.createUser = async function () {
    const nameEl  = document.getElementById('cuf-name');
    const emailEl = document.getElementById('cuf-email');
    const passEl  = document.getElementById('cuf-pass');
    const errEl   = document.getElementById('cuf-error');
    const btn     = document.getElementById('btn-create-user');

    errEl.classList.remove('show');
    errEl.textContent = '';

    const name     = nameEl.value.trim();
    const email    = emailEl.value.trim();
    const password = passEl.value;

    if (!name) { errEl.textContent = 'El nombre es obligatorio.'; errEl.classList.add('show'); return; }
    if (!password || password.length < 4) { errEl.textContent = 'La contraseña debe tener al menos 4 caracteres.'; errEl.classList.add('show'); return; }

    btn.disabled = true;
    try {
      const res = await fetch('/db/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email: email || undefined, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || 'Error al crear usuario.';
        errEl.classList.add('show');
        return;
      }
      showToast(`Usuario creado: ${data.email}`);
      nameEl.value = '';
      emailEl.value = '';
      passEl.value = '';
      document.getElementById('create-user-fields').classList.remove('open');
      load();  // refresh table
    } catch (_) {
      errEl.textContent = 'Error de conexion.';
      errEl.classList.add('show');
    } finally {
      btn.disabled = false;
    }
  };

  load();
})();
</script>
</body>
</html>
