<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yt2mp3 · admin DB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1c1c1c; --surface: #222; --surface2: #2a2a2a;
      --border: #333; --border2: #3a3a3a;
      --neon: #39FF14; --neon-dim: rgba(57,255,20,.15);
      --text: #e0e0e0; --muted: #777; --mono: 'JetBrains Mono', monospace;
      --radius: 6px; --font: 'Inter', system-ui, sans-serif;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 14px;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: .75rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10; gap: 1rem; flex-wrap: wrap;
    }
    .topbar-logo { font-size: 1.1rem; font-weight: 600; letter-spacing: -.5px; flex-shrink: 0; }
    .topbar-logo .sep { color: #27a008; }
    .topbar-logo .mp3 { color: var(--neon); }
    .topbar-logo .admin-label {
      font-size: .7rem; color: var(--muted); letter-spacing: .1em;
      text-transform: uppercase; margin-left: .5rem;
    }
    .topbar-right { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }

    .stat-pill {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 20px; padding: .2rem .75rem;
      font-size: .78rem; color: var(--muted);
    }
    .stat-pill span { color: var(--neon); font-weight: 600; }

    /* per-page selector */
    .per-page-select {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: .28rem .55rem; font-size: .78rem;
      font-family: var(--font); cursor: pointer;
    }
    .per-page-select:focus { outline: none; border-color: var(--neon); }

    /* ZIP button */
    .btn-zip {
      background: var(--neon); color: #0a0a0a; border: none;
      border-radius: var(--radius); font-family: var(--font);
      font-weight: 600; padding: .32rem .85rem; cursor: pointer;
      font-size: .8rem; transition: background .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .btn-zip:hover { background: #4fff25; box-shadow: 0 0 10px var(--neon-dim); }

    /* Delete button */
    .btn-delete {
      background: #ff4d4d; color: #111; border: none;
      border-radius: var(--radius); font-family: var(--font);
      font-weight: 600; padding: .32rem .85rem; cursor: pointer;
      font-size: .8rem; transition: background .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .btn-delete:hover { background: #ff6b6b; box-shadow: 0 0 10px rgba(255,77,77,.4); }

    /* Refresh button + countdown */
    .btn-refresh {
      background: transparent; border: 1px solid var(--border2);
      border-radius: var(--radius); color: var(--muted);
      font-family: var(--font); font-size: .8rem;
      padding: .28rem .65rem; cursor: pointer;
      transition: border-color .15s, color .15s;
      display: flex; align-items: center; gap: .35rem;
    }
    .btn-refresh:hover { border-color: var(--muted); color: var(--text); }
    .btn-refresh svg { width: .9rem; height: .9rem; flex-shrink: 0; }
    .refresh-countdown {
      font-size: .72rem; color: var(--muted); font-family: var(--mono);
      min-width: 2.8rem; text-align: right;
    }

    /* ── Main ── */
    .main { padding: 1.5rem; }

    /* ── Table wrapper ── */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    table {
      width: 100%; border-collapse: collapse;
      font-size: .82rem; white-space: nowrap;
    }
    thead th {
      background: var(--surface); border-bottom: 1px solid var(--border2);
      color: var(--muted); font-weight: 600;
      padding: .6rem .8rem; text-align: left;
      letter-spacing: .04em; font-size: .75rem; text-transform: uppercase;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--neon-dim); }
    td { padding: .55rem .8rem; vertical-align: top; }
    td.mono { font-family: var(--mono); font-size: .78rem; color: var(--muted); }

    /* selected row highlight */
    tr.selected-row {
      background: rgba(57,255,20,.06) !important;
      box-shadow: inset 3px 0 0 var(--neon);
    }

    /* checkboxes */
    input[type=checkbox] { accent-color: var(--neon); cursor: pointer; width: 1rem; height: 1rem; }

    .badge {
      display: inline-block; padding: .15rem .5rem;
      border-radius: 4px; font-size: .72rem; font-weight: 600;
    }
    .badge-mobile { background: rgba(57,255,20,.15); color: var(--neon); }
    .badge-desktop { background: rgba(130,130,255,.15); color: #8888ff; }
    .badge-tablet { background: rgba(255,180,50,.15); color: #ffb432; }

    .bot-badge {
      display: inline-block; padding: .12rem .45rem;
      border-radius: 4px; font-size: .72rem; font-weight: 700;
      font-family: var(--mono);
    }
    .bot-low  { background: rgba(57,255,20,.12);  color: #39FF14; }
    .bot-mid  { background: rgba(255,200,50,.12); color: #ffc832; }
    .bot-high { background: rgba(255,77,77,.15);  color: #ff4d4d; }

    .url-cell  { max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .title-cell { max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
    .fp-cell   { max-width: 120px; overflow: hidden; text-overflow: ellipsis; font-family: var(--mono); font-size: .75rem; color: var(--muted); }
    .hw-cell   { max-width: 200px; overflow: hidden; text-overflow: ellipsis; font-size: .78rem; }

    /* Version badge */
    .version-badge {
      position: fixed; bottom: .75rem; right: 1rem;
      font-size: .7rem; color: #555; letter-spacing: .03em;
      pointer-events: none; user-select: none;
    }
    .version-badge a { color: #555; text-decoration: none; pointer-events: all; }
    .version-badge a:hover { color: #888; }
    @media (max-width: 480px) { .version-badge { display: none; } }

    /* row detail expand */
    tr.detail-row td {
      background: var(--surface2); white-space: normal;
      padding: .75rem 1rem; font-size: .8rem;
    }
    .detail-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: .4rem .8rem;
    }
    .detail-item { display: flex; flex-direction: column; gap: .1rem; }
    .detail-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .detail-value { font-family: var(--mono); font-size: .78rem; word-break: break-all; }

    .btn-expand {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: .95rem; line-height: 1;
      padding: 0 .25rem; transition: color .1s;
    }
    .btn-expand:hover { color: var(--neon); }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: .5rem; margin-top: 1.25rem;
    }
    .page-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font); font-size: .82rem;
      padding: .35rem .7rem; cursor: pointer; text-decoration: none;
      transition: border-color .15s, color .15s;
    }
    .page-btn:hover { border-color: var(--neon); color: var(--neon); }
    .page-btn.active { border-color: var(--neon); color: var(--neon); background: var(--neon-dim); }
    .page-btn.disabled { opacity: .35; pointer-events: none; }
    .page-info { font-size: .8rem; color: var(--muted); }

    .empty { text-align: center; padding: 3rem; color: var(--muted); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <span class="yt">yt</span><span class="sep">2</span><span class="mp3">mp3</span>
    <span class="admin-label">admin</span>
  </div>
  <div class="topbar-right">
    <a href="/db/analytics" style="color:var(--muted);text-decoration:none;font-size:.82rem;
       padding:.25rem .6rem;border-radius:var(--radius);transition:color .15s,background .15s;"
       onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
       onmouseout="this.style.color='var(--muted)';this.style.background='transparent'">Analytics</a>
    <div class="stat-pill">total <span>{{ pagination.total }}</span></div>
    <div class="stat-pill">página <span id="page-indicator">{{ pagination.page }}/{{ pagination.pages or 1 }}</span></div>

    <select class="per-page-select" id="per-page-select" onchange="changePerPage(this.value)" title="Filas por página">
      {% for n in [10, 25, 50, 100] %}
      <option value="{{ n }}" {% if n == per_page %}selected{% endif %}>{{ n }} / pág</option>
      {% endfor %}
    </select>

    <button class="btn-zip hidden" id="btn-zip" onclick="downloadZip()">↓ ZIP (0)</button>
    <button class="btn-delete hidden" id="btn-delete">Eliminar seleccionados (0)</button>

    <button class="btn-refresh" id="btn-refresh" onclick="doRefresh()" title="Refrescar tabla">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Refresh
    </button>
    {% if refresh_interval > 0 %}
    <span class="refresh-countdown" id="refresh-countdown">--:--</span>
    {% endif %}
  </div>
</div>

<div class="main">
  <div id="table-container">
    {% include 'admin/_table.html' %}
  </div>
</div>

<div class="version-badge">
  v{{ version }} &middot; <a href="{{ repo_url }}/commit/{{ commit }}" target="_blank" rel="noopener">{{ commit[:7] }}</a> &middot; <a href="{{ repo_url }}" target="_blank" rel="noopener">github</a>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const REFRESH_INTERVAL = {{ refresh_interval }};  // seconds (0 = disabled)
let currentPage    = {{ pagination.page }};
let currentPerPage = {{ per_page }};

// ── Countdown ───────────────────────────────────────────────────────────────
let countdown = REFRESH_INTERVAL;
let countdownTimer = null;
const countdownEl = document.getElementById('refresh-countdown');

function formatTime(s) {
  const m = String(Math.floor(s / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return `${m}:${sec}`;
}

function updateCountdown() {
  if (countdownEl) countdownEl.textContent = formatTime(countdown);
}

function resetCountdown() {
  countdown = REFRESH_INTERVAL;
  updateCountdown();
}

if (REFRESH_INTERVAL > 0) {
  updateCountdown();
  countdownTimer = setInterval(() => {
    countdown--;
    updateCountdown();
    if (countdown <= 0) doRefresh();
  }, 1000);
}

// ── AJAX table refresh ───────────────────────────────────────────────────────
async function doRefresh() {
  resetCountdown();

  // Save current selection
  const selectedIds = new Set(
    Array.from(document.querySelectorAll('.row-check:checked')).map(cb => cb.value)
  );

  const url = new URL('/db/table-fragment', window.location.origin);
  url.searchParams.set('page', currentPage);
  url.searchParams.set('per_page', currentPerPage);

  try {
    const resp = await fetch(url);
    if (!resp.ok) return;
    const html = await resp.text();
    document.getElementById('table-container').innerHTML = html;
  } catch (e) {
    return;
  }

  // Re-attach listeners and restore selection
  initCheckboxes();
  document.querySelectorAll('.row-check').forEach(cb => {
    if (selectedIds.has(cb.value)) {
      cb.checked = true;
      cb.closest('tr').classList.add('selected-row');
    }
  });
  updateActionButtons();
}

// ── Selection logic ──────────────────────────────────────────────────────────
function initCheckboxes() {
  const selectAll = document.getElementById('select-all');
  if (selectAll) {
    selectAll.addEventListener('change', function () {
  document.querySelectorAll('.row-check').forEach(cb => {
    cb.checked = this.checked;
    cb.closest('tr').classList.toggle('selected-row', this.checked);
  });
  updateActionButtons();
    });
  }

  document.querySelectorAll('.row-check').forEach(cb => {
    cb.addEventListener('change', function () {
      this.closest('tr').classList.toggle('selected-row', this.checked);
      syncSelectAll();
      updateActionButtons();
    });
  });
}

function syncSelectAll() {
  const all     = document.querySelectorAll('.row-check');
  const checked = document.querySelectorAll('.row-check:checked');
  const sa = document.getElementById('select-all');
  if (!sa) return;
  sa.checked       = checked.length > 0 && checked.length === all.length;
  sa.indeterminate = checked.length > 0 && checked.length < all.length;
}

function updateActionButtons() {
  const n      = document.querySelectorAll('.row-check:checked').length;
  const btnZip = document.getElementById('btn-zip');
  const btnDel = document.getElementById('btn-delete');
  if (btnZip) {
    btnZip.classList.toggle('hidden', n === 0);
    btnZip.textContent = `↓ ZIP (${n})`;
  }
  if (btnDel) {
    btnDel.classList.toggle('hidden', n === 0);
    btnDel.textContent = `Eliminar seleccionados (${n})`;
  }
}
// legacy alias used by older code paths
function updateZipBtn() { updateActionButtons(); }

// ── ZIP download ─────────────────────────────────────────────────────────────
async function downloadZip() {
  const ids = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => cb.value);
  if (!ids.length) return;

  const btn = document.getElementById('btn-zip');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = 'preparando…';

  try {
    const resp = await fetch('/db/download-zip', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_ids: ids }),
    });
    if (!resp.ok) {
      alert('No hay archivos descargables en la selección.');
      return;
    }
    const blob = await resp.blob();
    const cd   = resp.headers.get('Content-Disposition') || '';
    const match = cd.match(/filename="(.+?)"/);
    const name  = match ? match[1] : 'yt2mp3.zip';
    const a = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

// ── Per-page selector ────────────────────────────────────────────────────────
function changePerPage(val) {
  const url = new URL(window.location.href);
  url.searchParams.set('per_page', val);
  url.searchParams.set('page', 1);
  window.location.href = url.toString();
}

// ── Row expand ───────────────────────────────────────────────────────────────
function toggleDetail(id) {
  const row = document.getElementById('detail-' + id);
  const btn = row.previousElementSibling.querySelectorAll('.btn-expand')[0];
  const hidden = row.style.display === 'none';
  row.style.display = hidden ? 'table-row' : 'none';
  if (btn) btn.textContent = hidden ? '−' : '+';
}

// ── Delete records ────────────────────────────────────────────────────────────
document.getElementById('btn-delete').addEventListener('click', async function () {
  const checked = [...document.querySelectorAll('.row-check:checked')].map(c => c.value);
  if (!checked.length) return;
  if (!confirm(`¿Eliminar ${checked.length} descarga(s)? Se borrará el fichero MP3 y el registro.`)) return;

  this.disabled = true;
  const orig = this.textContent;
  this.textContent = 'Eliminando…';

  try {
    const resp = await fetch('/db/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_ids: checked }),
    });
    const data = await resp.json();
    if (resp.ok) {
      this.disabled = false;
      refreshTable();
    } else {
      alert(data.error || 'Error al eliminar');
      this.disabled = false;
      this.textContent = orig;
    }
  } catch (e) {
    alert('Error de conexión al intentar eliminar.');
    this.disabled = false;
    this.textContent = orig;
  }
});

// ── Convenience alias used by delete handler ──────────────────────────────────
function refreshTable() { doRefresh(); }

// ── Rename title ──────────────────────────────────────────────────────────────
async function renameTitle(jobId, currentTitle) {
  const newTitle = prompt('Renombrar título:', currentTitle);
  if (!newTitle || newTitle.trim() === '' || newTitle.trim() === currentTitle) return;

  try {
    const resp = await fetch('/db/rename', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: jobId, title: newTitle.trim() }),
    });
    const data = await resp.json();
    if (resp.ok && data.ok) {
      refreshTable();
    } else {
      alert(data.error || 'Error al renombrar');
    }
  } catch (e) {
    alert('Error de conexión al intentar renombrar.');
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
initCheckboxes();
</script>

</body>
</html>
