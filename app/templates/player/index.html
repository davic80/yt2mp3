<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yt2mp3 · player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1c1c1c; --surface: #222; --surface2: #2a2a2a; --surface3: #303030;
      --border: #333; --border2: #3a3a3a;
      --neon: #39FF14; --neon-dim: rgba(57,255,20,.12);
      --text: #e0e0e0; --muted: #666; --muted2: #888;
      --radius: 6px; --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --topbar-h: 52px; --player-h: 80px; --sidebar-w: 220px;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 14px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      height: var(--topbar-h); min-height: var(--topbar-h);
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem; gap: 1rem; flex-shrink: 0;
    }
    .topbar-logo { font-size: 1.05rem; font-weight: 600; letter-spacing: -.5px; }
    .topbar-logo .sep { color: #27a008; }
    .topbar-logo .mp3 { color: var(--neon); }
    .topbar-logo .label {
      font-size: .68rem; color: var(--muted2); letter-spacing: .1em;
      text-transform: uppercase; margin-left: .45rem;
    }
    .topbar-links { display: flex; gap: .6rem; align-items: center; }
    .topbar-link {
      color: var(--muted2); text-decoration: none; font-size: .82rem;
      padding: .22rem .55rem; border-radius: var(--radius);
      transition: color .15s, background .15s;
    }
    .topbar-link:hover { color: var(--text); background: var(--surface2); }

    /* ── Layout body ── */
    .layout {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto; flex-shrink: 0;
    }
    .sidebar-section { padding: .75rem .85rem .4rem; }
    .sidebar-label {
      font-size: .68rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: .35rem;
    }
    .sidebar-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: .42rem .6rem; border-radius: var(--radius); cursor: pointer;
      font-size: .84rem; color: var(--muted2); transition: background .12s, color .12s;
      user-select: none; gap: .5rem;
    }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: var(--neon-dim); color: var(--neon); }
    .sidebar-item .pl-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sidebar-item .pl-count {
      font-size: .72rem; color: var(--muted); background: var(--surface2);
      border-radius: 10px; padding: .05rem .45rem; flex-shrink: 0;
    }
    .sidebar-item.active .pl-count { background: rgba(57,255,20,.15); color: var(--neon); }
    .sidebar-div { border-top: 1px solid var(--border); margin: .4rem .85rem; }
    .btn-new-pl {
      display: flex; align-items: center; gap: .4rem;
      padding: .42rem .6rem; border-radius: var(--radius); cursor: pointer;
      font-size: .82rem; color: var(--muted2); transition: background .12s, color .12s;
      background: none; border: none; font-family: var(--font); width: 100%;
      text-align: left;
    }
    .btn-new-pl:hover { background: var(--surface2); color: var(--neon); }
    .btn-new-pl .plus { font-size: 1rem; line-height: 1; color: var(--neon); }
    .sidebar-pl-del {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: .85rem; padding: 0 .2rem; line-height: 1; flex-shrink: 0;
      transition: color .12s;
    }
    .sidebar-pl-del:hover { color: #ff4d4d; }

    /* ── Main ── */
    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .search-bar {
      padding: .85rem 1.25rem .6rem;
      flex-shrink: 0;
    }
    .search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font); font-size: .84rem;
      padding: .45rem .8rem; outline: none;
      transition: border-color .15s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--neon); }

    .track-list-wrap {
      flex: 1; overflow-y: auto; padding: 0 1.25rem 1rem;
    }
    .track-list { width: 100%; border-collapse: collapse; }
    .track-list thead th {
      background: var(--bg); border-bottom: 1px solid var(--border);
      color: var(--muted); font-weight: 600; font-size: .72rem;
      text-transform: uppercase; letter-spacing: .05em;
      padding: .5rem .6rem; text-align: left; position: sticky; top: 0; z-index: 2;
    }
    .track-list tbody tr {
      border-bottom: 1px solid var(--border); transition: background .1s; cursor: pointer;
    }
    .track-list tbody tr:last-child { border-bottom: none; }
    .track-list tbody tr:hover { background: var(--neon-dim); }
    .track-list tbody tr.playing { background: rgba(57,255,20,.08); }
    .track-list tbody tr.playing td.col-title { color: var(--neon); }
    .track-list td { padding: .55rem .6rem; vertical-align: middle; }
    .col-fav { width: 2rem; text-align: center; }
    .col-title { max-width: 340px; }
    .col-size { width: 6rem; color: var(--muted); font-size: .78rem; text-align: right; white-space: nowrap; }
    .col-date { width: 9rem; color: var(--muted); font-size: .78rem; white-space: nowrap; }
    .col-menu { width: 2.5rem; text-align: center; }

    .title-text {
      font-size: .88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: block; max-width: 100%;
    }
    .fav-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; line-height: 1; padding: 0;
      color: var(--muted); transition: color .12s, transform .12s;
    }
    .fav-btn:hover { transform: scale(1.2); }
    .fav-btn.on { color: #ff4d8e; }

    .menu-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.1rem; line-height: 1;
      padding: .1rem .3rem; border-radius: 4px;
      transition: color .12s, background .12s;
    }
    .menu-btn:hover { color: var(--text); background: var(--surface2); }

    /* ── Dropdown ── */
    .dropdown {
      position: fixed; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: .35rem 0; min-width: 170px;
      box-shadow: 0 4px 16px rgba(0,0,0,.5); z-index: 100; display: none;
    }
    .dropdown.open { display: block; }
    .dropdown-item {
      padding: .45rem .9rem; font-size: .84rem; cursor: pointer;
      color: var(--text); white-space: nowrap;
      transition: background .1s, color .1s;
    }
    .dropdown-item:hover { background: var(--neon-dim); color: var(--neon); }
    .dropdown-item.remove { color: #ff4d4d; }
    .dropdown-item.remove:hover { background: rgba(255,77,77,.1); color: #ff4d4d; }
    .dropdown-div { border-top: 1px solid var(--border); margin: .25rem 0; }

    .empty-msg {
      text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: .9rem;
    }

    /* ── Player bar ── */
    .player-bar {
      height: var(--player-h); min-height: var(--player-h);
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.25rem; flex-shrink: 0;
    }
    .player-info {
      width: 200px; min-width: 0; flex-shrink: 0;
    }
    .player-title {
      font-size: .84rem; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; color: var(--text);
    }
    .player-title-empty { color: var(--muted); font-size: .82rem; }

    .player-controls {
      display: flex; align-items: center; gap: .5rem; flex-shrink: 0;
    }
    .ctrl-btn {
      background: none; border: none; cursor: pointer; color: var(--muted2);
      font-size: 1.1rem; padding: .3rem; border-radius: 50%;
      transition: color .12s, background .12s;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:hover { color: var(--text); background: var(--surface2); }
    .ctrl-btn.active { color: var(--neon); }
    .ctrl-btn.play-pause {
      width: 2.4rem; height: 2.4rem; font-size: 1.3rem;
      background: var(--neon-dim); border: 1px solid rgba(57,255,20,.3);
      color: var(--neon);
    }
    .ctrl-btn.play-pause:hover { background: rgba(57,255,20,.2); }

    .player-progress {
      flex: 1; display: flex; align-items: center; gap: .65rem; min-width: 0;
    }
    .time-label { font-size: .75rem; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
    .progress-wrap {
      flex: 1; height: 4px; background: var(--surface3); border-radius: 2px;
      cursor: pointer; position: relative;
    }
    .progress-fill {
      height: 100%; background: var(--neon); border-radius: 2px;
      width: 0%; pointer-events: none; transition: width .1s linear;
    }
    .progress-wrap:hover .progress-fill { background: #4fff25; }

    .volume-wrap { display: flex; align-items: center; gap: .4rem; flex-shrink: 0; }
    .vol-icon { font-size: .95rem; color: var(--muted2); cursor: pointer; user-select: none; }
    input[type=range].vol-slider {
      -webkit-appearance: none; appearance: none;
      width: 80px; height: 4px; background: var(--surface3); border-radius: 2px;
      outline: none; cursor: pointer;
    }
    input[type=range].vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: var(--neon); border-radius: 50%;
    }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-logo">
    <span>yt</span><span class="sep">2</span><span class="mp3">mp3</span>
    <span class="label">player</span>
  </div>
  <div class="topbar-links">
    <a href="/db" class="topbar-link">→ Admin</a>
  </div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-item active" id="view-all" onclick="setView('all')">
        <span class="pl-name">Todas</span>
      </div>
      <div class="sidebar-item" id="view-favorites" onclick="setView('favorites')">
        <span class="pl-name">♥ Favoritos</span>
      </div>
    </div>
    <div class="sidebar-div"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Playlists</div>
      <button class="btn-new-pl" onclick="createPlaylist()">
        <span class="plus">+</span> Nueva playlist
      </button>
      <div id="playlist-list"></div>
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="search-bar">
      <input class="search-input" type="search" id="search-input"
             placeholder="Buscar..." oninput="renderTracks()" />
    </div>
    <div class="track-list-wrap">
      <div id="track-container"><div class="empty-msg">Cargando...</div></div>
    </div>
  </div>

</div>

<!-- Dropdown (shared) -->
<div class="dropdown" id="dropdown"></div>

<!-- Player bar -->
<div class="player-bar">
  <div class="player-info">
    <div class="player-title player-title-empty" id="player-title">Sin reproducción</div>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" id="btn-shuffle" onclick="toggleShuffle()" title="Aleatorio">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line>
        <polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line>
      </svg>
    </button>
    <button class="ctrl-btn" onclick="prevTrack()" title="Anterior">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"></line>
      </svg>
    </button>
    <button class="ctrl-btn play-pause" id="btn-play" onclick="togglePlay()" title="Play/Pausa">
      <span id="play-icon">▶</span>
    </button>
    <button class="ctrl-btn" onclick="nextTrack()" title="Siguiente">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"></line>
      </svg>
    </button>
    <button class="ctrl-btn" id="btn-repeat" onclick="cycleRepeat()" title="Repetir">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
        <polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
      </svg>
    </button>
  </div>
  <div class="player-progress">
    <span class="time-label" id="time-current">0:00</span>
    <div class="progress-wrap" id="progress-wrap" onclick="seek(event)">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="time-label" id="time-total">0:00</span>
  </div>
  <div class="volume-wrap">
    <span class="vol-icon" onclick="toggleMute()">🔊</span>
    <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.02"
           value="1" oninput="setVolume(this.value)" />
  </div>
</div>

<audio id="audio"></audio>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  view:       'all',        // 'all' | 'favorites' | <playlist_id>
  tracks:     [],           // all done tracks from API
  playlists:  [],           // playlists from API
  plTracks:   {},           // { pid: [...tracks] } cache
  queue:      [],           // job_ids for current view
  queueIndex: 0,
  shuffle:    false,
  repeat:     'none',       // 'none' | 'one' | 'all'
  currentJob: null,
};
const audio = document.getElementById('audio');

// ── Format helpers ─────────────────────────────────────────────────────────────
function fmtTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = String(Math.floor(s % 60)).padStart(2, '0');
  return `${m}:${sec}`;
}
function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
  return Math.round(bytes / 1024) + ' KB';
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

// ── API ───────────────────────────────────────────────────────────────────────
async function loadAll() {
  const [tracksRes, plRes] = await Promise.all([
    fetch('/player/api/tracks'),
    fetch('/player/api/playlists'),
  ]);
  state.tracks    = await tracksRes.json();
  state.playlists = await plRes.json();
  renderSidebar();
  renderTracks();
}

async function loadPlaylistTracks(pid) {
  if (state.plTracks[pid]) return state.plTracks[pid];
  const res = await fetch(`/player/api/playlists/${pid}/tracks`);
  state.plTracks[pid] = await res.json();
  return state.plTracks[pid];
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('playlist-list');
  if (!state.playlists.length) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = state.playlists.map(pl => `
    <div class="sidebar-item ${state.view == pl.id ? 'active' : ''}"
         onclick="setView(${pl.id})" data-plid="${pl.id}">
      <span class="pl-name">${esc(pl.name)}</span>
      <span class="pl-count">${pl.track_count}</span>
      <button class="sidebar-pl-del" onclick="event.stopPropagation();deletePlaylist(${pl.id})"
              title="Eliminar playlist">×</button>
    </div>
  `).join('');
}

// ── View switching ────────────────────────────────────────────────────────────
async function setView(view) {
  state.view = view;
  // Update sidebar active state
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if (view === 'all')       document.getElementById('view-all').classList.add('active');
  else if (view === 'favorites') document.getElementById('view-favorites').classList.add('active');
  else {
    const el = document.querySelector(`.sidebar-item[data-plid="${view}"]`);
    if (el) el.classList.add('active');
  }
  // Preload playlist tracks if needed
  if (typeof view === 'number') await loadPlaylistTracks(view);
  renderTracks();
}

// ── Track list rendering ──────────────────────────────────────────────────────
function getViewTracks() {
  if (state.view === 'all')       return state.tracks;
  if (state.view === 'favorites') return state.tracks.filter(t => t.is_favorite);
  const pl = state.plTracks[state.view];
  if (!pl) return [];
  // Return tracks in playlist order, enriched with metadata from state.tracks
  return pl.map(pt => {
    const full = state.tracks.find(t => t.job_id === pt.job_id);
    return full || pt;
  });
}

function getFilteredTracks() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const base = getViewTracks();
  if (!q) return base;
  return base.filter(t => (t.title || '').toLowerCase().includes(q));
}

function renderTracks() {
  const tracks = getFilteredTracks();
  const container = document.getElementById('track-container');

  // Build queue from current filtered list
  state.queue = tracks.map(t => t.job_id);

  if (!tracks.length) {
    container.innerHTML = '<div class="empty-msg">No hay canciones.</div>';
    return;
  }

  container.innerHTML = `
    <table class="track-list">
      <thead>
        <tr>
          <th class="col-fav">♥</th>
          <th>Título</th>
          <th class="col-size">Tamaño</th>
          <th class="col-date">Fecha</th>
          <th class="col-menu"></th>
        </tr>
      </thead>
      <tbody>
        ${tracks.map((t, i) => `
          <tr data-job="${t.job_id}" data-idx="${i}"
              class="${state.currentJob === t.job_id ? 'playing' : ''}"
              onclick="playTrack('${t.job_id}', ${i})">
            <td class="col-fav" onclick="event.stopPropagation()">
              <button class="fav-btn ${t.is_favorite ? 'on' : ''}"
                      onclick="toggleFav('${t.job_id}', this)"
                      title="${t.is_favorite ? 'Quitar de favoritos' : 'Agregar a favoritos'}">
                ${t.is_favorite ? '♥' : '♡'}
              </button>
            </td>
            <td class="col-title">
              <span class="title-text" title="${esc(t.title || t.job_id)}">${esc(t.title || t.job_id)}</span>
            </td>
            <td class="col-size">${fmtSize(t.file_size)}</td>
            <td class="col-date">${fmtDate(t.created_at)}</td>
            <td class="col-menu" onclick="event.stopPropagation()">
              <button class="menu-btn" onclick="openMenu(event, '${t.job_id}')" title="Opciones">⋮</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ── Playback ─────────────────────────────────────────────────────────────────
function playTrack(jobId, idx) {
  state.currentJob  = jobId;
  state.queueIndex  = idx;
  audio.src = `/player/stream/${jobId}`;
  audio.play();
  updatePlayerTitle(jobId);
  highlightRow(jobId);
}

function updatePlayerTitle(jobId) {
  const track = state.tracks.find(t => t.job_id === jobId);
  const el = document.getElementById('player-title');
  el.classList.remove('player-title-empty');
  el.textContent = track ? (track.title || jobId) : jobId;
}

function highlightRow(jobId) {
  document.querySelectorAll('.track-list tbody tr').forEach(row => {
    row.classList.toggle('playing', row.dataset.job === jobId);
  });
}

function togglePlay() {
  if (!audio.src || !state.currentJob) return;
  if (audio.paused) audio.play();
  else              audio.pause();
}

function prevTrack() {
  if (!state.queue.length) return;
  let idx = state.queueIndex - 1;
  if (idx < 0) idx = state.repeat === 'all' ? state.queue.length - 1 : 0;
  const jobId = state.queue[idx];
  if (jobId) playTrack(jobId, idx);
}

function nextTrack() {
  if (!state.queue.length) return;
  let idx;
  if (state.shuffle) {
    idx = Math.floor(Math.random() * state.queue.length);
  } else {
    idx = state.queueIndex + 1;
    if (idx >= state.queue.length) {
      if (state.repeat === 'all') idx = 0;
      else return; // end of queue
    }
  }
  const jobId = state.queue[idx];
  if (jobId) playTrack(jobId, idx);
}

function toggleShuffle() {
  state.shuffle = !state.shuffle;
  document.getElementById('btn-shuffle').classList.toggle('active', state.shuffle);
}

function cycleRepeat() {
  const modes = ['none', 'one', 'all'];
  state.repeat = modes[(modes.indexOf(state.repeat) + 1) % modes.length];
  const btn = document.getElementById('btn-repeat');
  btn.classList.toggle('active', state.repeat !== 'none');
  btn.title = state.repeat === 'none' ? 'Repetir' : state.repeat === 'one' ? 'Repetir canción' : 'Repetir todo';
}

audio.addEventListener('play',  () => { document.getElementById('play-icon').textContent = '⏸'; });
audio.addEventListener('pause', () => { document.getElementById('play-icon').textContent = '▶'; });
audio.addEventListener('ended', () => {
  if (state.repeat === 'one') {
    audio.play();
  } else {
    nextTrack();
  }
});

// ── Progress bar ──────────────────────────────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  const cur  = audio.currentTime;
  const dur  = audio.duration;
  document.getElementById('time-current').textContent = fmtTime(cur);
  document.getElementById('time-total').textContent   = fmtTime(dur);
  const pct = dur ? (cur / dur * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
});

function seek(e) {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct  = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

// ── Volume ─────────────────────────────────────────────────────────────────────
function setVolume(v) { audio.volume = v; }
function toggleMute() {
  audio.muted = !audio.muted;
  document.querySelector('.vol-icon').textContent = audio.muted ? '🔇' : '🔊';
}

// ── Favorites ─────────────────────────────────────────────────────────────────
async function toggleFav(jobId, btn) {
  const res  = await fetch('/player/api/favorite', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ job_id: jobId }),
  });
  const data = await res.json();
  const isFav = data.is_favorite;

  // Update state
  const track = state.tracks.find(t => t.job_id === jobId);
  if (track) track.is_favorite = isFav;

  // Update button inline (no full re-render)
  btn.classList.toggle('on', isFav);
  btn.textContent = isFav ? '♥' : '♡';
  btn.title = isFav ? 'Quitar de favoritos' : 'Agregar a favoritos';

  // If currently in favorites view, re-render to reflect removal
  if (state.view === 'favorites') renderTracks();
}

// ── Context menu ──────────────────────────────────────────────────────────────
let _menuJob = null;
function openMenu(e, jobId) {
  _menuJob = jobId;
  const dd = document.getElementById('dropdown');
  let html = '';

  // "Quitar de esta playlist" if inside a playlist view
  if (typeof state.view === 'number') {
    html += `<div class="dropdown-item remove" onclick="removeFromPlaylist(${state.view},'${jobId}')">Quitar de esta playlist</div>`;
    html += '<div class="dropdown-div"></div>';
  }

  // Add to new playlist
  html += `<div class="dropdown-item" onclick="createAndAddPlaylist('${jobId}')">+ Nueva playlist</div>`;
  if (state.playlists.length) {
    html += '<div class="dropdown-div"></div>';
    html += state.playlists.map(pl =>
      `<div class="dropdown-item" onclick="addToPlaylist(${pl.id},'${jobId}')">${esc(pl.name)}</div>`
    ).join('');
  }

  dd.innerHTML = html;

  // Position dropdown near the button
  const rect = e.currentTarget.getBoundingClientRect();
  dd.style.top  = (rect.bottom + 4) + 'px';
  dd.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
  dd.classList.add('open');

  e.stopPropagation();
}

document.addEventListener('click', () => {
  document.getElementById('dropdown').classList.remove('open');
});

// ── Playlist operations ───────────────────────────────────────────────────────
async function createPlaylist() {
  const name = prompt('Nombre de la playlist:');
  if (!name || !name.trim()) return;
  const res  = await fetch('/player/api/playlists', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name.trim() }),
  });
  const pl = await res.json();
  state.playlists.unshift({ id: pl.id, name: pl.name, track_count: 0, last_added: null });
  renderSidebar();
}

async function createAndAddPlaylist(jobId) {
  const name = prompt('Nombre de la nueva playlist:');
  if (!name || !name.trim()) return;
  const res = await fetch('/player/api/playlists', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name.trim() }),
  });
  const pl = await res.json();
  state.playlists.unshift({ id: pl.id, name: pl.name, track_count: 0, last_added: null });
  await addToPlaylist(pl.id, jobId);
}

async function addToPlaylist(pid, jobId) {
  document.getElementById('dropdown').classList.remove('open');
  await fetch(`/player/api/playlists/${pid}/tracks`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ job_id: jobId }),
  });
  // Invalidate cache and update count
  delete state.plTracks[pid];
  const pl = state.playlists.find(p => p.id === pid);
  if (pl) {
    pl.track_count++;
    pl.last_added = new Date().toISOString();
    // Re-sort playlists by last_added desc
    state.playlists.sort((a, b) => {
      if (!a.last_added && !b.last_added) return 0;
      if (!a.last_added) return 1;
      if (!b.last_added) return -1;
      return new Date(b.last_added) - new Date(a.last_added);
    });
  }
  renderSidebar();
}

async function removeFromPlaylist(pid, jobId) {
  document.getElementById('dropdown').classList.remove('open');
  await fetch(`/player/api/playlists/${pid}/tracks/${jobId}`, { method: 'DELETE' });
  delete state.plTracks[pid];
  const pl = state.playlists.find(p => p.id === pid);
  if (pl && pl.track_count > 0) pl.track_count--;
  renderSidebar();
  if (state.view === pid) await setView(pid);
}

async function deletePlaylist(pid) {
  if (!confirm('¿Eliminar esta playlist?')) return;
  await fetch(`/player/api/playlists/${pid}`, { method: 'DELETE' });
  state.playlists = state.playlists.filter(p => p.id !== pid);
  delete state.plTracks[pid];
  if (state.view === pid) setView('all');
  else renderSidebar();
}

// ── Util ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadAll();
