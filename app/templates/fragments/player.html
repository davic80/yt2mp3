<style>
  .layout {
    height: 100%; display: flex; overflow: hidden; position: relative;
  }
  /* ── Sidebar ── */
  .sidebar {
    width: 220px; min-width: 220px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; flex-shrink: 0;
  }
  .sidebar-section { padding: .75rem .85rem .4rem; }
  .sidebar-label {
    font-size: .68rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: .35rem;
  }
  .sidebar-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: .42rem .6rem; border-radius: var(--radius); cursor: pointer;
    font-size: .84rem; color: var(--muted2); transition: background .12s, color .12s;
    user-select: none; gap: .5rem;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: var(--neon-dim); color: var(--neon); }
  .sidebar-item .pl-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-item .pl-count {
    font-size: .72rem; color: var(--muted); background: var(--surface2);
    border-radius: 10px; padding: .05rem .45rem; flex-shrink: 0;
  }
  .sidebar-item.active .pl-count { background: rgba(57,255,20,.15); color: var(--neon); }
  .sidebar-div { border-top: 1px solid var(--border); margin: .4rem .85rem; }
  .btn-new-pl {
    display: flex; align-items: center; gap: .4rem;
    padding: .42rem .6rem; border-radius: var(--radius); cursor: pointer;
    font-size: .82rem; color: var(--muted2); transition: background .12s, color .12s;
    background: none; border: none; font-family: var(--font); width: 100%; text-align: left;
  }
  .btn-new-pl:hover { background: var(--surface2); color: var(--neon); }
  .btn-new-pl .plus { font-size: 1rem; line-height: 1; color: var(--neon); }
  .sidebar-pl-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: .85rem; padding: 0 .2rem; line-height: 1; flex-shrink: 0;
    transition: color .12s;
  }
  .sidebar-pl-del:hover { color: #ff4d4d; }
  .sidebar-pl-share {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: .8rem; padding: 0 .2rem; line-height: 1; flex-shrink: 0;
    transition: color .12s;
  }
  .sidebar-pl-share:hover { color: var(--neon); }
  /* ── Hamburger button (hidden on desktop) ── */
  .btn-sidebar-toggle {
    display: none;
    background: none; border: none; cursor: pointer;
    color: var(--muted2); padding: .4rem .5rem; border-radius: var(--radius);
    font-size: 1.15rem; line-height: 1;
    transition: color .12s, background .12s; flex-shrink: 0;
  }
  .btn-sidebar-toggle:hover { color: var(--text); background: var(--surface2); }
  /* ── Drawer overlay ── */
  .sidebar-overlay {
    display: none; position: absolute; inset: 0; background: rgba(0,0,0,.55);
    z-index: 40;
  }
  .sidebar-overlay.open { display: block; }
  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .search-bar { padding: .85rem 1.25rem .6rem; flex-shrink: 0; display: flex; align-items: center; gap: .5rem; }
  .search-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font); font-size: .84rem;
    padding: .45rem .8rem; outline: none; transition: border-color .15s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--neon); }
  .track-list-wrap { flex: 1; overflow-y: auto; padding: 0 1.25rem 1rem; }
  .track-list { width: 100%; border-collapse: collapse; }
  .track-list thead th {
    background: var(--bg); border-bottom: 1px solid var(--border);
    color: var(--muted); font-weight: 600; font-size: .72rem;
    text-transform: uppercase; letter-spacing: .05em;
    padding: .5rem .6rem; text-align: left; position: sticky; top: 0; z-index: 2;
  }
  .track-list tbody tr {
    border-bottom: 1px solid var(--border); transition: background .1s; cursor: pointer;
  }
  .track-list tbody tr:last-child { border-bottom: none; }
  .track-list tbody tr:hover    { background: var(--neon-dim); }
  .track-list tbody tr.playing  { background: rgba(57,255,20,.08); }
  .track-list tbody tr.playing td.col-title { color: var(--neon); }
  .track-list td { padding: .55rem .6rem; vertical-align: middle; }
  .col-fav   { width: 2rem; text-align: center; }
  .col-title { max-width: 340px; }
  .col-size  { width: 6rem; color: var(--muted); font-size: .78rem; text-align: right; white-space: nowrap; }
  .col-date  { width: 9rem; color: var(--muted); font-size: .78rem; white-space: nowrap; }
  .col-menu  { width: 2.5rem; text-align: center; }
  .title-text {
    font-size: .88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: block; max-width: 100%;
  }
  .fav-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 0;
    color: var(--muted); transition: color .12s, transform .12s;
  }
  .fav-btn:hover { transform: scale(1.2); }
  .fav-btn.on { color: #ff4d8e; }
  .menu-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.1rem; line-height: 1;
    padding: .1rem .3rem; border-radius: 4px;
    transition: color .12s, background .12s;
  }
  .menu-btn:hover { color: var(--text); background: var(--surface2); }
  /* ── Dropdown ── */
  .dropdown {
    position: fixed; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: .35rem 0; min-width: 170px;
    box-shadow: 0 4px 16px rgba(0,0,0,.5); z-index: 100; display: none;
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: .45rem .9rem; font-size: .84rem; cursor: pointer;
    color: var(--text); white-space: nowrap; transition: background .1s, color .1s;
  }
  .dropdown-item:hover { background: var(--neon-dim); color: var(--neon); }
  .dropdown-item.remove { color: #ff4d4d; }
  .dropdown-item.remove:hover { background: rgba(255,77,77,.1); color: #ff4d4d; }
  .dropdown-div { border-top: 1px solid var(--border); margin: .25rem 0; }
  .empty-msg { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: .9rem; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    /* Sidebar becomes an off-canvas drawer */
    .sidebar {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 80%; max-width: 280px; min-width: 0;
      z-index: 50; border-right: 1px solid var(--border2);
      transform: translateX(-100%);
      transition: transform .22s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay { display: none; }
    .sidebar-overlay.open { display: block; }
    /* Show hamburger — rule also in shell.html for WebKit innerHTML compat */
    /* .btn-sidebar-toggle { display: flex; }  ← enforced by shell */
    /* Bigger touch targets in track list */
    .track-list td { padding: .75rem .5rem; }
    .menu-btn { padding: .35rem .55rem; font-size: 1.25rem; }
    .fav-btn  { font-size: 1.15rem; padding: .1rem; }
    /* Hide size and date columns */
    .col-size, .col-date,
    .track-list thead th.col-size,
    .track-list thead th.col-date { display: none; }
    /* Reduce search bar padding */
    .search-bar { padding: .6rem .75rem .4rem; }
    .track-list-wrap { padding: 0 .5rem .75rem; }
    /* Dropdown items bigger for touch */
    .dropdown-item { padding: .7rem 1rem; font-size: .9rem; }
  }

  /* ── Share modal ── */
  .share-modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 200; align-items: center; justify-content: center;
  }
  .share-modal-overlay.open { display: flex; }
  .share-modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 1.4rem 1.6rem;
    min-width: 320px; max-width: 480px; width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
  }
  .share-modal-title {
    font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 1rem;
  }
  .share-modal-url {
    font-size: .78rem; color: var(--neon); background: var(--surface2);
    border: 1px solid var(--border2); border-radius: var(--radius);
    padding: .55rem .75rem; word-break: break-all; margin-bottom: 1rem;
    font-family: monospace; cursor: text; user-select: all;
  }
  .share-modal-actions { display: flex; gap: .6rem; flex-wrap: wrap; }
  .share-modal-actions button {
    flex: 1; min-width: 80px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); border-radius: var(--radius);
    font-family: var(--font); font-size: .82rem;
    padding: .45rem .75rem; cursor: pointer; transition: background .12s, color .12s;
  }
  .share-modal-actions button:hover { background: var(--neon-dim); color: var(--neon); }
  .share-modal-actions button.danger:hover { background: rgba(255,77,77,.1); color: #ff4d4d; }
  .share-modal-actions button.primary { border-color: var(--neon); color: var(--neon); }

  /* ── Shared view header ── */
  .shared-header {
    display: flex; align-items: center; gap: .75rem;
    padding: .6rem 1.25rem; border-bottom: 1px solid var(--border);
    flex-shrink: 0; background: var(--surface);
  }
  .shared-header-name { font-size: .9rem; font-weight: 600; color: var(--neon); }
  .shared-header-sub  { font-size: .75rem; color: var(--muted); }
  .col-claim { width: 5.5rem; text-align: center; }
  .claim-btn {
    background: none; border: 1px solid var(--border2); border-radius: var(--radius);
    color: var(--muted2); font-size: .75rem; padding: .2rem .5rem; cursor: pointer;
    font-family: var(--font); transition: all .12s; white-space: nowrap;
  }
  .claim-btn:hover { border-color: var(--neon); color: var(--neon); }
  .claim-btn.claimed { border-color: transparent; color: var(--muted); cursor: default; }

  /* ── Lyrics panel ── */
  .lyrics-panel {
    width: 260px; min-width: 260px; flex-shrink: 0;
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .lyrics-panel.hidden { display: none; }
  .lyrics-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .65rem .9rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .lyrics-header-actions { display: flex; align-items: center; gap: .1rem; }
  .lyrics-close {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 0 .2rem; transition: color .12s;
  }
  .lyrics-close:hover { color: var(--text); }
  .lyrics-size-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: .72rem; font-weight: 600; font-family: var(--font);
    line-height: 1; padding: .1rem .25rem; transition: color .12s;
  }
  .lyrics-size-btn:hover { color: var(--neon); }
  .lyrics-body { flex: 1; overflow-y: auto; padding: .75rem .9rem; }
  .lyrics-loading { color: var(--muted); font-size: .82rem; text-align: center; padding: 2rem 0; }
  .lyrics-plain { font-size: .82rem; line-height: 1.7; color: var(--muted2); white-space: pre-wrap; }
  .lyrics-line {
    display: block; font-size: .82rem; line-height: 1.7; color: var(--muted);
    transition: color .2s, font-size .15s; padding: .05rem 0;
    cursor: default;
  }
  .lyrics-line.active {
    color: var(--neon); font-weight: 600;
  }
  .lyrics-not-found { color: var(--muted); font-size: .82rem; text-align: center; padding: 2rem 0; }
  .col-lyrics { width: 2rem; text-align: center; }
  .lyrics-btn {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: .9rem; padding: 0; line-height: 1; transition: color .12s;
  }
  .lyrics-btn:hover { color: var(--neon); }
  .lyrics-btn.active { color: var(--neon); }
  @media (max-width: 600px) {
    .lyrics-panel {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 85%; max-width: 300px; z-index: 50;
      border-left: 1px solid var(--border2);
      transform: translateX(100%); transition: transform .22s ease;
    }
    .lyrics-panel.open { transform: translateX(0); }
  }
</style>

<!-- Layout -->
<div class="layout">

  <!-- Drawer overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeDrawer()"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-item active" id="view-all" onclick="setView('all')">
        <span class="pl-name" id="sidebar-all-label"></span>
      </div>
      <div class="sidebar-item" id="view-favorites" onclick="setView('favorites')">
        <span class="pl-name" id="sidebar-fav-label"></span>
      </div>
    </div>
    <div class="sidebar-div"></div>
    <div class="sidebar-section">
      <div class="sidebar-label" id="sidebar-pl-label"></div>
      <button class="btn-new-pl" onclick="createPlaylist()">
        <span class="plus">+</span> <span id="sidebar-newpl-label"></span>
      </button>
      <div id="playlist-list"></div>
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="search-bar">
      <button class="btn-sidebar-toggle" onclick="openDrawer()" aria-label="Menu">☰</button>
      <input class="search-input" type="search" id="search-input"
             oninput="renderTracks()" />
    </div>
    <div class="track-list-wrap">
      <div id="track-container"><div class="empty-msg" id="track-loading"></div></div>
    </div>
  </div>

  <!-- Lyrics panel -->
  <div class="lyrics-panel hidden" id="lyrics-panel">
    <div class="lyrics-header">
      <span class="lyrics-title" id="lyrics-panel-title"></span>
      <div class="lyrics-header-actions">
        <button class="lyrics-size-btn" onclick="shrinkLyrics()" title="Texto más pequeño">A−</button>
        <button class="lyrics-size-btn" onclick="growLyrics()"   title="Texto más grande">A+</button>
        <button class="lyrics-close" onclick="closeLyrics()">✕</button>
      </div>
    </div>
    <div class="lyrics-body" id="lyrics-body"></div>
  </div>

</div>

<!-- Dropdown (shared) -->
<div class="dropdown" id="dropdown"></div>

<!-- Share modal -->
<div class="share-modal-overlay" id="share-modal-overlay" onclick="closeShareModal()">
  <div class="share-modal" onclick="event.stopPropagation()">
    <div class="share-modal-title" id="share-modal-title"></div>
    <div class="share-modal-url" id="share-modal-url"></div>
    <div class="share-modal-actions">
      <button class="primary" onclick="copyShareUrl()" id="share-copy-btn"></button>
      <button class="danger"  onclick="revokeShare()"  id="share-revoke-btn"></button>
      <button                 onclick="closeShareModal()" id="share-close-btn"></button>
    </div>
  </div>
</div>

<script>
(function () {
  // ── State ───────────────────────────────────────────────────────────────────
  const state = {
    view:         'all',
    tracks:       [],
    playlists:    [],
    plTracks:     {},
    queue:        [],
    queueIndex:   0,
    currentJob:   null,
    lyricsEnabled: false,
    shareEnabled:  false,
  };

  // ── i18n shell strings ───────────────────────────────────────────────────────
  function applyStaticStrings() {
    const I = window.I18n;
    const allLabel  = document.getElementById('sidebar-all-label');
    const favLabel  = document.getElementById('sidebar-fav-label');
    const plLabel   = document.getElementById('sidebar-pl-label');
    const newPlSpan = document.getElementById('sidebar-newpl-label');
    const searchEl  = document.getElementById('search-input');
    const loadingEl = document.getElementById('track-loading');
    if (allLabel)  allLabel.textContent  = I.t('player.all');
    if (favLabel)  favLabel.textContent  = I.t('player.favorites');
    if (plLabel)   plLabel.textContent   = I.t('player.playlists_label');
    if (newPlSpan) newPlSpan.textContent = I.t('player.new_playlist').replace(/^\+\s*/, '');
    if (searchEl)  searchEl.placeholder  = I.t('player.search');
    if (loadingEl) loadingEl.textContent = I.t('player.loading');
  }

  // ── API ─────────────────────────────────────────────────────────────────────
  async function loadAll() {
    applyStaticStrings();
    try {
      const [tracksRes, plRes, featRes] = await Promise.all([
        fetch('/player/api/tracks'),
        fetch('/player/api/playlists'),
        fetch('/player/api/me/features'),
      ]);
      state.tracks      = await tracksRes.json();
      state.playlists   = await plRes.json();
      const feat        = await featRes.json();
      state.lyricsEnabled = Boolean(feat.lyrics_enabled);
      state.shareEnabled  = Boolean(feat.share_enabled);

      // Show/hide lyrics button in the persistent player bar
      window._showLyricsBtn?.(state.lyricsEnabled);

      // Hand the full track list to the global player
      if (window.Player) window.Player.loadTracks(state.tracks);

      // Check for shared view mode
      const sharedToken = new URLSearchParams(location.search).get('shared');
      if (sharedToken) {
        renderSidebar();
        await loadSharedView(sharedToken);
      } else {
        renderSidebar();
        renderTracks();
      }

      // Register row-highlight callback
      if (window.Player) {
        window.Player.onTrackChange(function (jobId) {
          state.currentJob = jobId;
          highlightRow(jobId);
        });
        // Highlight immediately if something is already playing
        const ps = window.Player.getState();
        if (ps.currentJob) {
          state.currentJob = ps.currentJob;
          highlightRow(ps.currentJob);
        }
      }
    } catch (err) {
      console.error('[player] loadAll failed:', err);
      const el = document.getElementById('track-list');
      if (el) el.innerHTML = '<p style="color:#f66;padding:1rem">Failed to load player data. Please refresh.</p>';
    }
  }

  async function loadPlaylistTracks(pid) {
    if (state.plTracks[pid]) return state.plTracks[pid];
    const res = await fetch(`/player/api/playlists/${pid}/tracks`);
    state.plTracks[pid] = await res.json();
    return state.plTracks[pid];
  }

  // ── Sidebar ─────────────────────────────────────────────────────────────────
  function renderSidebar() {
    const el = document.getElementById('playlist-list');
    if (!state.playlists.length) { el.innerHTML = ''; return; }
    el.innerHTML = state.playlists.map(pl => `
      <div class="sidebar-item ${state.view == pl.id ? 'active' : ''}"
           onclick="setView(${pl.id})" data-plid="${pl.id}">
        <span class="pl-name">${esc(pl.name)}</span>
        <span class="pl-count">${pl.track_count}</span>
        ${state.shareEnabled ? `<button class="sidebar-pl-share" onclick="event.stopPropagation();sharePlaylist(${pl.id},'${esc(pl.name)}')"
                title="${window.I18n.t('player.share')}">⇗</button>` : ''}
        <button class="sidebar-pl-del" onclick="event.stopPropagation();deletePlaylist(${pl.id})"
                title="×">×</button>
      </div>
    `).join('');
  }

  // ── View switching ───────────────────────────────────────────────────────────
  async function setView(view) {
    closeDrawer();
    state.view = view;
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    if (view === 'all')            document.getElementById('view-all').classList.add('active');
    else if (view === 'favorites') document.getElementById('view-favorites').classList.add('active');
    else {
      const el = document.querySelector(`.sidebar-item[data-plid="${view}"]`);
      if (el) el.classList.add('active');
    }
    if (typeof view === 'number') await loadPlaylistTracks(view);
    renderTracks();
  }

  // ── Track list ───────────────────────────────────────────────────────────────
  function getViewTracks() {
    if (state.view === 'all')       return state.tracks;
    if (state.view === 'favorites') return state.tracks.filter(t => t.is_favorite);
    const pl = state.plTracks[state.view];
    if (!pl) return [];
    return pl.map(pt => {
      const full = state.tracks.find(t => t.job_id === pt.job_id);
      return full || pt;
    });
  }

  function getFilteredTracks() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const base = getViewTracks();
    if (!q) return base;
    return base.filter(t => (t.title || '').toLowerCase().includes(q));
  }

  function renderTracks() {
    const tracks = getFilteredTracks();
    const container = document.getElementById('track-container');
    const I = window.I18n;

    // Update queue in global player
    const jobIds = tracks.map(t => t.job_id);
    if (window.Player) window.Player.setQueue(jobIds);

    if (!tracks.length) {
      container.innerHTML = `<div class="empty-msg">${I.t('player.empty')}</div>`;
      return;
    }

    container.innerHTML = `
      <table class="track-list">
        <thead>
          <tr>
            <th class="col-fav">${I.t('player.col_fav')}</th>
            <th>${I.t('player.col_title')}</th>
            <th class="col-size">${I.t('player.col_size')}</th>
            <th class="col-date">${I.t('player.col_date')}</th>
            ${state.lyricsEnabled ? `<th class="col-lyrics"></th>` : ''}
            <th class="col-menu"></th>
          </tr>
        </thead>
        <tbody>
          ${tracks.map((t, i) => `
            <tr data-job="${t.job_id}" data-idx="${i}"
                class="${state.currentJob === t.job_id ? 'playing' : ''}"
                onclick="playTrack('${t.job_id}', ${i})">
              <td class="col-fav" onclick="event.stopPropagation()">
                <button class="fav-btn ${t.is_favorite ? 'on' : ''}"
                        onclick="toggleFav('${t.job_id}', this)"
                        title="${t.is_favorite ? I.t('player.fav_remove') : I.t('player.fav_add')}">
                  ${t.is_favorite ? '♥' : '♡'}
                </button>
              </td>
              <td class="col-title">
                <span class="title-text" title="${esc(t.title || t.job_id)}">${esc(t.title || t.job_id)}</span>
              </td>
              <td class="col-size">${fmtSize(t.file_size)}</td>
              <td class="col-date">${fmtDate(t.created_at)}</td>
              ${state.lyricsEnabled ? `
               <td class="col-lyrics" onclick="event.stopPropagation()">
                 <button class="lyrics-btn" onclick="openLyrics('${t.job_id}')"
                         id="lyrbtn-${t.job_id}" title="${I.t('player.lyrics')}"><svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M8 1a2.5 2.5 0 0 1 2.5 2.5v4a2.5 2.5 0 0 1-5 0v-4A2.5 2.5 0 0 1 8 1zm0 1A1.5 1.5 0 0 0 6.5 3.5v4a1.5 1.5 0 0 0 3 0v-4A1.5 1.5 0 0 0 8 2zm-4.5 5a.5.5 0 0 1 .5.5A4.5 4.5 0 0 0 12.5 7.5a.5.5 0 0 1 1 0A5.5 5.5 0 0 1 8.5 12.95V15h1a.5.5 0 0 1 0 1h-3a.5.5 0 0 1 0-1h1v-2.05A5.5 5.5 0 0 1 3 7.5a.5.5 0 0 1 .5-.5z"/></svg></button>
               </td>` : ''}
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    // Re-highlight current track after re-render
    if (state.currentJob) highlightRow(state.currentJob);
  }

  // ── Playback via global player ────────────────────────────────────────────────
  function playTrack(jobId, idx) {
    if (window.Player) {
      const tracks = getFilteredTracks();
      window.Player.setQueue(tracks.map(t => t.job_id), idx);
      const t = tracks.find(t => t.job_id === jobId);
      window.Player.playTrack(jobId, t ? (t.title || jobId) : jobId);
    }
  }

  function highlightRow(jobId) {
    document.querySelectorAll('.track-list tbody tr').forEach(row => {
      row.classList.toggle('playing', row.dataset.job === jobId);
    });
  }

  // ── Favorites ────────────────────────────────────────────────────────────────
  async function toggleFav(jobId, btn) {
    const res  = await fetch('/player/api/favorite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: jobId }),
    });
    const data  = await res.json();
    const isFav = data.is_favorite;
    const track = state.tracks.find(t => t.job_id === jobId);
    if (track) track.is_favorite = isFav;
    btn.classList.toggle('on', isFav);
    btn.textContent = isFav ? '♥' : '♡';
    btn.title = isFav ? window.I18n.t('player.fav_remove') : window.I18n.t('player.fav_add');
    if (state.view === 'favorites') renderTracks();
  }

  // ── Context menu ─────────────────────────────────────────────────────────────
  let _menuJob = null;
  function openMenu(e, jobId) {
    _menuJob = jobId;
    const dd = document.getElementById('dropdown');
    let html = '';
    const I = window.I18n;
    if (typeof state.view === 'number') {
      html += `<div class="dropdown-item remove" onclick="removeFromPlaylist(${state.view},'${jobId}')">${I.t('player.remove_from_pl')}</div>`;
      html += '<div class="dropdown-div"></div>';
    }
    html += `<div class="dropdown-item" onclick="createAndAddPlaylist('${jobId}')">${I.t('player.add_new_pl')}</div>`;
    if (state.playlists.length) {
      html += '<div class="dropdown-div"></div>';
      html += state.playlists.map(pl =>
        `<div class="dropdown-item" onclick="addToPlaylist(${pl.id},'${jobId}')">${esc(pl.name)}</div>`
      ).join('');
    }
    dd.innerHTML = html;
    const rect = e.currentTarget.getBoundingClientRect();
    dd.style.top  = (rect.bottom + 4) + 'px';
    dd.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
    dd.classList.add('open');
    e.stopPropagation();
  }

  document.addEventListener('click', () => {
    const dd = document.getElementById('dropdown');
    if (dd) dd.classList.remove('open');
  });

  // ── Playlist operations ───────────────────────────────────────────────────────
  async function createPlaylist() {
    const name = prompt(window.I18n.t('player.prompt_pl_name'));
    if (!name || !name.trim()) return;
    const res = await fetch('/player/api/playlists', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim() }),
    });
    const pl = await res.json();
    state.playlists.unshift({ id: pl.id, name: pl.name, track_count: 0, last_added: null });
    renderSidebar();
  }

  async function createAndAddPlaylist(jobId) {
    const name = prompt(window.I18n.t('player.prompt_pl_name2'));
    if (!name || !name.trim()) return;
    const res = await fetch('/player/api/playlists', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim() }),
    });
    const pl = await res.json();
    state.playlists.unshift({ id: pl.id, name: pl.name, track_count: 0, last_added: null });
    await addToPlaylist(pl.id, jobId);
  }

  async function addToPlaylist(pid, jobId) {
    const dd = document.getElementById('dropdown');
    if (dd) dd.classList.remove('open');
    await fetch(`/player/api/playlists/${pid}/tracks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: jobId }),
    });
    delete state.plTracks[pid];
    const pl = state.playlists.find(p => p.id === pid);
    if (pl) {
      pl.track_count++;
      pl.last_added = new Date().toISOString();
      state.playlists.sort((a, b) => {
        if (!a.last_added && !b.last_added) return 0;
        if (!a.last_added) return 1;
        if (!b.last_added) return -1;
        return new Date(b.last_added) - new Date(a.last_added);
      });
    }
    renderSidebar();
  }

  async function removeFromPlaylist(pid, jobId) {
    const dd = document.getElementById('dropdown');
    if (dd) dd.classList.remove('open');
    await fetch(`/player/api/playlists/${pid}/tracks/${jobId}`, { method: 'DELETE' });
    delete state.plTracks[pid];
    const pl = state.playlists.find(p => p.id === pid);
    if (pl && pl.track_count > 0) pl.track_count--;
    renderSidebar();
    if (state.view === pid) await setView(pid);
  }

  async function deletePlaylist(pid) {
    if (!confirm(window.I18n.t('player.confirm_del_pl'))) return;
    await fetch(`/player/api/playlists/${pid}`, { method: 'DELETE' });
    state.playlists = state.playlists.filter(p => p.id !== pid);
    delete state.plTracks[pid];
    if (state.view === pid) setView('all');
    else renderSidebar();
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function fmtSize(bytes) {
    if (!bytes) return '';
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
    return Math.round(bytes / 1024) + ' KB';
  }
  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('es', { year:'numeric', month:'2-digit', day:'2-digit' });
  }
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Drawer (mobile sidebar) ──────────────────────────────────────────────────
  function openDrawer() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
  }
  function closeDrawer() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }

  // ── Lyrics ──────────────────────────────────────────────────────────────────
  let _lyricsJob      = null;
  let _lrcLines       = [];   // [{time, text}] for synced
  let _lyricsFontSize = 0.82; // rem, adjustable with A+/A−
  const _FONT_MIN = 0.60, _FONT_MAX = 1.40, _FONT_STEP = 0.08;

  async function openLyrics(jobId) {
    if (!state.lyricsEnabled) return;

    // If already open for same track, close
    if (_lyricsJob === jobId && !document.getElementById('lyrics-panel').classList.contains('hidden')) {
      closeLyrics();
      return;
    }

    _lyricsJob = jobId;
    const panel = document.getElementById('lyrics-panel');
    const body  = document.getElementById('lyrics-body');
    const title = document.getElementById('lyrics-panel-title');

    // Mark button active
    document.querySelectorAll('.lyrics-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`lyrbtn-${jobId}`);
    if (btn) btn.classList.add('active');
    window._setLyricsBtnActive?.(true);

    const I = window.I18n;
    title.textContent = I.t('player.lyrics');
    body.innerHTML = `<div class="lyrics-loading">${I.t('player.lyrics_loading')}</div>`;
    panel.classList.remove('hidden', 'open');
    // mobile
    setTimeout(() => panel.classList.add('open'), 10);

    try {
      const res  = await fetch(`/player/api/lyrics/${jobId}`);
      if (!res.ok) {
        body.innerHTML = `<div class="lyrics-not-found">${I.t('player.lyrics_not_found')}</div>`;
        return;
      }
      const data = await res.json();

      if (data.synced && data.content) {
        _lrcLines = _parseLrc(data.content);
        _renderLrcLines();
        _startLrcSync();
      } else {
        _lrcLines = [];
        _stopLrcSync();
        body.innerHTML = `<pre class="lyrics-plain">${esc(data.plain || data.content || '')}</pre>`;
      }
    } catch (_) {
      body.innerHTML = `<div class="lyrics-not-found">${I.t('player.lyrics_not_found')}</div>`;
    }
  }

  function closeLyrics() {
    _lyricsJob      = null;
    _lrcLines       = [];
    _lyricsFontSize = 0.82;
    _stopLrcSync();
    document.querySelectorAll('.lyrics-btn').forEach(b => b.classList.remove('active'));
    window._setLyricsBtnActive?.(false);
    const panel = document.getElementById('lyrics-panel');
    panel.classList.remove('open');
    setTimeout(() => panel.classList.add('hidden'), 240);
  }

  function _parseLrc(lrc) {
    const lines = [];
    for (const line of lrc.split('\n')) {
      const m = line.match(/^\[(\d+):(\d+\.\d+)\](.*)/);
      if (m) {
        const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
        lines.push({ time, text: m[3].trim() });
      }
    }
    return lines;
  }

  function _renderLrcLines() {
    const body = document.getElementById('lyrics-body');
    if (!body) return;
    body.innerHTML = _lrcLines.map((l, i) =>
      `<span class="lyrics-line" id="lrc-${i}" style="font-size:${_lyricsFontSize}rem">${esc(l.text) || '&nbsp;'}</span>`
    ).join('');
  }

  function _applyFontSize() {
    document.querySelectorAll('.lyrics-line').forEach(el => {
      el.style.fontSize = _lyricsFontSize + 'rem';
    });
    const plain = document.querySelector('.lyrics-plain');
    if (plain) plain.style.fontSize = _lyricsFontSize + 'rem';
  }

  function growLyrics() {
    _lyricsFontSize = Math.min(_FONT_MAX, +(_lyricsFontSize + _FONT_STEP).toFixed(2));
    _applyFontSize();
  }

  function shrinkLyrics() {
    _lyricsFontSize = Math.max(_FONT_MIN, +(_lyricsFontSize - _FONT_STEP).toFixed(2));
    _applyFontSize();
  }

  function _syncLrc() {
    const audio = document.getElementById('audio');
    if (!audio) return;
    const t = audio.currentTime;
    let active = -1;
    for (let i = 0; i < _lrcLines.length; i++) {
      if (_lrcLines[i].time <= t) active = i;
      else break;
    }
    document.querySelectorAll('.lyrics-line').forEach((el, i) => {
      el.classList.toggle('active', i === active);
    });
    if (active >= 0) {
      const el = document.getElementById(`lrc-${active}`);
      if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  function _startLrcSync() {
    _stopLrcSync();
    const audio = document.getElementById('audio');
    if (!audio) return;
    audio.addEventListener('timeupdate', _syncLrc);
  }

  function _stopLrcSync() {
    const audio = document.getElementById('audio');
    if (audio) audio.removeEventListener('timeupdate', _syncLrc);
  }

  // ── Play tracking ────────────────────────────────────────────────────────────
  // These are stored on window so the single persisted audio.ended handler
  // (see below) always reads the current values across SPA navigations.
  let _playTimer    = null;
  window._pt_playStart    = window._pt_playStart    ?? null;
  window._pt_playJob      = window._pt_playJob      ?? null;
  window._pt_playReported = window._pt_playReported ?? false;

  function _startPlayTracking(jobId) {
    _stopPlayTracking();
    window._pt_playJob      = jobId;
    window._pt_playStart    = Date.now();
    window._pt_playReported = false;

    // Report after 30 s
    _playTimer = setTimeout(() => {
      _reportPlay(jobId, 30);
      window._pt_playReported = true;
    }, 30000);
  }

  function _stopPlayTracking() {
    if (_playTimer) { clearTimeout(_playTimer); _playTimer = null; }
  }

  function _reportPlay(jobId, seconds) {
    fetch('/player/api/plays', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: jobId, seconds_played: seconds }),
    }).catch(() => {});
  }

  // Hook into global player events for tracking and lyrics sync
  if (window.Player) {
    window.Player.onTrackChange(function (jobId) {
      // If previous track was playing and not yet reported, send actual seconds
      if (window._pt_playJob && !window._pt_playReported && window._pt_playStart) {
        const secs = Math.round((Date.now() - window._pt_playStart) / 1000);
        if (secs >= 10) _reportPlay(window._pt_playJob, secs);
      }
      _startPlayTracking(jobId);

      // Re-open lyrics for new track if panel is visible
      if (_lyricsJob && !document.getElementById('lyrics-panel').classList.contains('hidden')) {
        openLyrics(jobId);
      }
    });
  }

  // Also hook audio ended event for accurate seconds.
  // The <audio> element persists across SPA navigations; guard with a sentinel
  // so only one handler is ever attached, reading window._pt_* for current state.
  const _audioEl = document.getElementById('audio');
  if (_audioEl && !_audioEl._playTrackingBound) {
    _audioEl._playTrackingBound = true;
    _audioEl.addEventListener('ended', () => {
      if (window._pt_playJob && window._pt_playStart) {
        const secs = Math.round((Date.now() - window._pt_playStart) / 1000);
        _reportPlay(window._pt_playJob, secs);
        window._pt_playReported = true;
      }
    });
  }

  // ── Share ────────────────────────────────────────────────────────────────────
  let _sharePid   = null;
  let _shareToken = null;

  async function sharePlaylist(pid, name) {
    const res  = await fetch(`/player/api/playlists/${pid}/share`, { method: 'POST' });
    const data = await res.json();
    _sharePid   = pid;
    _shareToken = data.token;
    const url   = `${location.origin}/player?shared=${data.token}`;
    const I = window.I18n;
    document.getElementById('share-modal-title').textContent  = I.t('player.share_title') + ': ' + name;
    document.getElementById('share-modal-url').textContent    = url;
    document.getElementById('share-copy-btn').textContent     = I.t('player.share_copy');
    document.getElementById('share-revoke-btn').textContent   = I.t('player.share_revoke');
    document.getElementById('share-close-btn').textContent    = I.t('player.share_close');
    document.getElementById('share-modal-overlay').classList.add('open');
  }

  function closeShareModal() {
    document.getElementById('share-modal-overlay').classList.remove('open');
    _sharePid = null; _shareToken = null;
  }

  async function copyShareUrl() {
    const url = document.getElementById('share-modal-url').textContent;
    try {
      await navigator.clipboard.writeText(url);
    } catch (_) {
      // fallback: select text
      const el = document.getElementById('share-modal-url');
      const range = document.createRange();
      range.selectNodeContents(el);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    }
    const btn = document.getElementById('share-copy-btn');
    const orig = btn.textContent;
    btn.textContent = window.I18n.t('player.share_copied');
    setTimeout(() => { btn.textContent = orig; }, 1800);
  }

  async function revokeShare() {
    if (!_sharePid) return;
    await fetch(`/player/api/playlists/${_sharePid}/share`, { method: 'DELETE' });
    closeShareModal();
  }

  // ── Shared view (recipient) ───────────────────────────────────────────────────
  async function loadSharedView(token) {
    const res  = await fetch(`/player/api/shared/${token}`);
    const data = await res.json();
    const I    = window.I18n;

    // Hide sidebar, show shared header above main
    document.getElementById('sidebar').style.display = 'none';
    const main = document.querySelector('.main');

    const header = document.createElement('div');
    header.className = 'shared-header';
    header.innerHTML = `
      <div>
        <div class="shared-header-name">${data.name ? esc(data.name) : I.t('player.shared_invalid')}</div>
        <div class="shared-header-sub">${I.t('player.shared_view')}</div>
      </div>`;
    main.prepend(header);

    if (!data.name) {
      document.getElementById('track-container').innerHTML =
        `<div class="empty-msg">${I.t('player.shared_invalid')}</div>`;
      return;
    }

    // Build track list — mark which ones the current user already owns
    const ownedIds = new Set(state.tracks.map(t => t.job_id));
    const tracks = data.tracks;

    if (window.Player) window.Player.setQueue(tracks.map(t => t.job_id));

    if (!tracks.length) {
      document.getElementById('track-container').innerHTML =
        `<div class="empty-msg">${I.t('player.empty')}</div>`;
      return;
    }

    document.getElementById('track-container').innerHTML = `
      <table class="track-list">
        <thead>
          <tr>
            <th class="col-claim"></th>
            <th>${I.t('player.col_title')}</th>
            <th class="col-size">${I.t('player.col_size')}</th>
            <th class="col-menu"></th>
          </tr>
        </thead>
        <tbody>
          ${tracks.map((t, i) => {
            const owned = ownedIds.has(t.job_id);
            return `
            <tr data-job="${t.job_id}" data-idx="${i}"
                class="${state.currentJob === t.job_id ? 'playing' : ''}"
                onclick="playTrack('${t.job_id}', ${i})">
              <td class="col-claim" onclick="event.stopPropagation()">
                <button class="claim-btn ${owned ? 'claimed' : ''}"
                        id="claim-${t.job_id}"
                        onclick="${owned ? '' : `claimTrack('${token}','${t.job_id}',this)`}"
                        ${owned ? 'disabled' : ''}>
                  ${owned ? I.t('player.claimed') : I.t('player.claim')}
                </button>
              </td>
              <td class="col-title">
                <span class="title-text" title="${esc(t.title || t.job_id)}">${esc(t.title || t.job_id)}</span>
              </td>
              <td class="col-size">${fmtSize(t.file_size)}</td>
              <td class="col-menu"></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;

    // Load shared tracks into player track registry so titles work
    if (window.Player) window.Player.loadTracks(tracks);
  }

  async function claimTrack(token, jobId, btn) {
    btn.disabled = true;
    btn.textContent = '…';
    const res  = await fetch(`/player/api/shared/${token}/claim/${jobId}`, { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      btn.textContent = window.I18n.t('player.claimed');
      btn.classList.add('claimed');
    } else {
      btn.disabled = false;
      btn.textContent = window.I18n.t('player.claim');
    }
  }

  // Expose to onclick attrs in generated HTML
  window.setView             = setView;
  window.playTrack           = playTrack;
  window.toggleFav           = toggleFav;
  window.openMenu            = openMenu;
  window.createPlaylist      = createPlaylist;
  window.createAndAddPlaylist = createAndAddPlaylist;
  window.addToPlaylist       = addToPlaylist;
  window.removeFromPlaylist  = removeFromPlaylist;
  window.deletePlaylist      = deletePlaylist;
  window.renderTracks        = renderTracks;
  window.openDrawer          = openDrawer;
  window.closeDrawer         = closeDrawer;
  window.sharePlaylist       = sharePlaylist;
  window.copyShareUrl        = copyShareUrl;
  window.revokeShare         = revokeShare;
  window.closeShareModal     = closeShareModal;
  window.claimTrack          = claimTrack;
  window.openLyrics          = openLyrics;
  window.closeLyrics         = closeLyrics;
  window.growLyrics          = growLyrics;
  window.shrinkLyrics        = shrinkLyrics;

  // Re-render when language changes
  document.addEventListener('i18n:change', () => {
    applyStaticStrings();
    renderSidebar();
    renderTracks();
  });

  loadAll();
})();
</script>
