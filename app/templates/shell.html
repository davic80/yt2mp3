<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yt2mp3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1c1c1c; --surface: #222; --surface2: #2a2a2a; --surface3: #303030;
      --border: #333; --border2: #3a3a3a;
      --neon: #39FF14; --neon-dim: rgba(57,255,20,.12);
      --text: #e0e0e0; --muted: #666; --muted2: #888;
      --red: #ff4d4d; --red-dim: rgba(255,77,77,.1);
      --radius: 6px; --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --topbar-h: 52px; --player-h: 80px;
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 14px;
    }
    body { display: flex; flex-direction: column; }

    /* ── Topbar ── */
    .topbar {
      height: var(--topbar-h); min-height: var(--topbar-h);
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem; gap: 1rem; flex-shrink: 0; z-index: 10;
    }
    .topbar-logo { font-size: 1.05rem; font-weight: 600; letter-spacing: -.5px; flex-shrink: 0; }
    .topbar-logo .sep { color: #27a008; }
    .topbar-logo .mp3 { color: var(--neon); }

    .topbar-nav { display: flex; align-items: center; gap: .4rem; flex: 1; margin-left: 1.2rem; }
    .topbar-link {
      color: var(--muted2); text-decoration: none; font-size: .82rem;
      padding: .22rem .6rem; border-radius: var(--radius);
      transition: color .15s, background .15s; white-space: nowrap;
    }
    .topbar-link:hover { color: var(--text); background: var(--surface2); }
    .topbar-link-active { color: var(--neon) !important; background: var(--neon-dim) !important; }

    /* ── Lang toggle ── */
    .lang-toggle {
      display: flex; align-items: center; gap: .25rem; flex-shrink: 0;
    }
    .lang-btn {
      background: none; border: none; cursor: pointer;
      font-family: var(--font); font-size: .72rem; font-weight: 600;
      color: var(--muted); padding: .2rem .25rem; border-radius: 4px;
      letter-spacing: .04em; transition: color .12s, background .12s;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active { color: var(--neon); }
    .lang-sep { color: var(--border2); font-size: .75rem; user-select: none; }

    /* ── Auth zone (top-right) ── */
    .auth-zone {
      display: flex; align-items: center; gap: .6rem; flex-shrink: 0;
    }
    .auth-avatar {
      width: 2.4rem; height: 2.4rem; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--neon);
    }
    .auth-name {
      font-size: .78rem; color: #aaa; max-width: 120px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-decoration: none; transition: color .15s;
    }
    .auth-name:hover { color: var(--neon); }
    .auth-btn {
      background: none; border: 1px solid #444; border-radius: var(--radius);
      color: #aaa; font-family: var(--font);
      font-size: .75rem; padding: .25rem .65rem; cursor: pointer;
      text-decoration: none; transition: border-color .15s, color .15s; white-space: nowrap;
    }
    .auth-btn:hover { border-color: var(--neon); color: var(--neon); }
    .auth-btn.login { border-color: var(--neon); color: var(--neon); }
    .hidden { display: none !important; }

    /* ── Topbar responsive ── */
    @media (max-width: 600px) {
      :root { --topbar-h: 96px; }
      /* Two-row topbar */
      .topbar {
        flex-wrap: wrap;
        height: var(--topbar-h); min-height: var(--topbar-h);
        align-content: center;
        padding: 0 .75rem;
        gap: 0;
        row-gap: 0;
      }
      /* Row 1: logo (left) + lang + auth (right) */
      .topbar-logo { order: 1; flex: 1; font-size: 1rem; }
      .lang-toggle { order: 1; }
      .auth-zone   { order: 1; }
    }
    /* Always show full labels; short spans are unused */
    .topbar-link .link-short { display: none; }
    .topbar-link .link-full  { display: inline; }

    /* ── Page content (swappable area) ── */
    #page-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Player bar ── */
    .player-bar {
      height: var(--player-h); min-height: var(--player-h);
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.25rem; flex-shrink: 0; z-index: 10;
    }
    .player-artwork {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      background: var(--surface3);
      opacity: 0; transition: opacity .25s ease;
      display: block;
    }
    .player-artwork.loaded { opacity: 1; }
    .player-info { flex: 1; min-width: 0; }
    .player-title {
      font-size: .84rem; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; color: var(--text);
    }
    .player-title-empty { color: var(--muted); font-size: .82rem; }
    .player-controls { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
    .ctrl-btn {
      background: none; border: none; cursor: pointer; color: var(--muted2);
      font-size: 1.1rem; padding: .3rem; border-radius: 50%;
      transition: color .12s, background .12s;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:hover { color: var(--text); background: var(--surface2); }
    .ctrl-btn.active { color: var(--neon); }
    .ctrl-btn.play-pause {
      width: 2.4rem; height: 2.4rem; font-size: 1.3rem;
      background: var(--neon-dim); border: 1px solid rgba(57,255,20,.3);
      color: var(--neon);
    }
    .ctrl-btn.play-pause:hover { background: rgba(57,255,20,.2); }
    /* optical centering handled by SVG viewBox — no padding needed */
    .player-right { flex: 1; display: flex; align-items: center; gap: .65rem; min-width: 0; justify-content: flex-end; }
    .player-progress { flex: 1; display: flex; align-items: center; gap: .65rem; min-width: 0; max-width: 480px; }
    .time-label { font-size: .75rem; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
    .progress-wrap {
      flex: 1; height: 4px; background: var(--surface3); border-radius: 2px;
      cursor: pointer; position: relative;
    }
    .progress-fill {
      height: 100%; background: var(--neon); border-radius: 2px;
      width: 0%; pointer-events: none; transition: width .1s linear;
    }
    .progress-wrap:hover .progress-fill { background: #4fff25; }
    .volume-wrap { display: flex; align-items: center; gap: .4rem; flex-shrink: 0; }
    .vol-btn { color: var(--muted2); }
    input[type=range].vol-slider {
      -webkit-appearance: none; appearance: none;
      width: 80px; height: 4px; background: var(--surface3); border-radius: 2px;
      outline: none; cursor: pointer;
    }
    input[type=range].vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: var(--neon); border-radius: 50%;
    }

    /* ── Player bar: hide when no session ── */
    body:not(.has-session) .player-bar { display: none; }

    /* ── Player bar responsive ── */
    @media (max-width: 600px) {
      /* 2 rows always: row 1 = title + all controls (play rightmost),
         row 2 = progress bar full width. Fixed 96px. */
      :root { --player-h: 96px; }
      .player-bar {
        flex-wrap: wrap; height: var(--player-h); min-height: var(--player-h);
        padding: .35rem .75rem; column-gap: .2rem; row-gap: .45rem; align-content: center;
      }
      .player-artwork { width: 40px; height: 40px; border-radius: 6px; order: 0; }
      /* Row 1: title (left, flex-1) */
      .player-info {
        order: 1; flex: 1; min-width: 0; width: auto;
        text-align: left; padding: 0;
      }
      /* Row 1: all 5 controls on the right */
      .player-controls {
        order: 1; flex-shrink: 0; gap: .3rem;
        display: flex; align-items: center;
      }
      /* Show all buttons in compact state */
      .player-controls > button { display: flex; }
      /* Row 2: progress bar spans full width */
      .player-right {
        order: 2; width: 100%; flex: none;
        display: flex; align-items: center; gap: .35rem;
        padding: 0 .1rem;
      }
      .player-progress {
        flex: 1; max-width: none;
        display: flex; align-items: center; gap: .35rem;
      }
      .volume-wrap { display: flex; }   /* show mute button */
      .vol-icon    { display: flex; }    /* keep mute icon */
      #vol-slider  { display: none !important; }    /* hide slider — doesn't work on mobile */
      .time-label  { display: none; }
      .ctrl-btn { padding: .5rem; font-size: 1.25rem; }
      .ctrl-btn svg { width: 20px; height: 20px; }
      .ctrl-btn.play-pause { width: 3rem; height: 3rem; }
      .ctrl-btn.play-pause svg { width: 20px; height: 20px; }
      /* fix: hamburger button for player sidebar — force visible */
      .btn-sidebar-toggle { display: flex !important; }

      /* body.is-playing: same layout, no change needed */

      /* Topbar row 2: grid left/center/right */
      .topbar-nav {
        order: 2;
        width: 100%; flex: none;
        margin-left: 0;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        padding: .15rem 0;
      }
      .topbar-nav [data-path="/"]              { order: 1; text-align: left; }
      .topbar-nav [data-path="/player"]        { order: 2; text-align: center; }
      .topbar-nav [data-path="/mis-descargas"] { order: 3; text-align: right; }
      .topbar-link { font-size: .72rem; padding: .22rem .3rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

      /* Lang toggle: show flag + text, with spacing from avatar */
      .lang-btn      { padding: .2rem .35rem; font-size: .7rem; }
      .lang-btn-text { display: inline; }
      .lang-toggle   { margin-right: 1.2rem; }

      /* Avatar */
      .auth-avatar { width: 2.2rem; height: 2.2rem; }
      .auth-name   { display: none; }
    }

    /* ── Version badge ── */
    .version-badge {
      position: fixed; bottom: calc(var(--player-h) + .5rem); right: .75rem;
      font-size: .65rem; color: var(--muted); letter-spacing: .04em;
      pointer-events: none; z-index: 5;
    }
    .version-badge a { color: var(--muted); text-decoration: none; pointer-events: all; }
    .version-badge a:hover { color: var(--text); }
    @media (max-width: 480px) { .version-badge { display: none; } }
  </style>
</head>
<body>

<!-- ── Topbar ── -->
<div class="topbar">
  <div class="topbar-logo">
    <span>yt</span><span class="sep">2</span><span class="mp3">mp3</span>
  </div>
  <nav class="topbar-nav">
    <a href="/"              class="topbar-link" data-path="/"><span class="link-full">→ Descargar</span><span class="link-short">→</span></a>
    <a href="/player"        class="topbar-link" data-path="/player"><span class="link-full">♪ Player</span><span class="link-short">♪</span></a>
    <a href="/mis-descargas" class="topbar-link" data-path="/mis-descargas"><span class="link-full">↓ Mis descargas</span><span class="link-short">↓ Mis</span></a>
  </nav>
  <!-- Language selector -->
  <div class="lang-toggle" id="lang-toggle">
    <button class="lang-btn" data-lang="es" onclick="I18n.setLang('es')"><span class="lang-flag">🇪🇸</span><span class="lang-btn-text"> ES</span></button>
    <span class="lang-sep">|</span>
    <button class="lang-btn" data-lang="en" onclick="I18n.setLang('en')"><span class="lang-flag">🇬🇧</span><span class="lang-btn-text"> EN</span></button>
  </div>
  <!-- Auth zone -->
  <div class="auth-zone" id="auth-zone">
    <div id="auth-loggedin" class="hidden" style="display:flex;align-items:center;gap:.6rem;">
      <img id="auth-avatar" class="auth-avatar" src="" alt="avatar" />
      <a id="auth-name" class="auth-name" href="/player" title="ir al player"></a>
      <a href="/auth/logout" class="auth-btn">salir</a>
    </div>
    <div id="auth-loggedout" class="hidden">
      <a href="/auth/login?next=/player" class="auth-btn login">entrar</a>
    </div>
  </div>
</div>

<!-- ── Page content (fragments swap here) ── -->
<div id="page-content">
  {% include 'fragments/' + initial_fragment + '.html' %}
</div>

<!-- ── Player bar (persistent) ── -->
<div class="player-bar">
  <img id="player-artwork" class="player-artwork" src="" alt="" aria-hidden="true">
  <div class="player-info">
    <div class="player-title player-title-empty" id="player-title">Sin reproducción</div>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" id="btn-shuffle" onclick="_playerToggleShuffle()" title="Aleatorio">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line>
        <polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line>
      </svg>
    </button>
    <button class="ctrl-btn" onclick="_playerPrev()" title="Anterior">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="19 20 9 12 19 4 19 20"></polygon>
        <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"></line>
      </svg>
    </button>
    <button class="ctrl-btn play-pause" id="btn-play" onclick="_playerTogglePlay()" title="Play/Pausa">
      <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
      <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <rect x="6" y="4" width="4" height="16"></rect>
        <rect x="14" y="4" width="4" height="16"></rect>
      </svg>
    </button>
    <button class="ctrl-btn" onclick="_playerNext()" title="Siguiente">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 4 15 12 5 20 5 4"></polygon>
        <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"></line>
      </svg>
    </button>
    <button class="ctrl-btn" id="btn-repeat" onclick="_playerCycleRepeat()" title="Repetir">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
        <polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
      </svg>
    </button>
  </div>
  <div class="player-right">
    <div class="player-progress">
      <span class="time-label" id="time-current">0:00</span>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="time-label" id="time-total">0:00</span>
    </div>
    <button class="ctrl-btn" id="btn-lyrics" onclick="_playerToggleLyrics()" title="Letra" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="22"></line>
        <line x1="8" y1="22" x2="16" y2="22"></line>
      </svg>
    </button>
    <div class="volume-wrap">
      <button class="ctrl-btn vol-btn" onclick="_playerToggleMute()" title="Silenciar">
        <svg id="icon-vol" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
        <svg id="icon-mute" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <line x1="23" y1="9" x2="17" y2="15"></line>
          <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
      </button>
      <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.02" value="1" />
    </div>
  </div>
</div>

<audio id="audio"></audio>

<div class="version-badge">
  v{{ version }} &middot; <a href="{{ repo_url }}/commit/{{ commit }}" target="_blank" rel="noopener">{{ commit[:7] }}</a> &middot; <a href="{{ repo_url }}" target="_blank" rel="noopener">github</a>
</div>

<script src="/static/i18n.js"></script>
<script src="/static/player.js"></script>
<script src="/static/lyrics.js"></script>
<script src="/static/spa.js"></script>
<script src="/static/app.js"></script>
<script>
  // Apply i18n to shell elements once DOM and i18n.js are ready
  I18n.init();

  // ── Lyrics button helpers (called by fragments) ────────────────────────────
  function _showLyricsBtn(enabled) {
    const btn = document.getElementById('btn-lyrics');
    if (btn) btn.style.display = enabled ? '' : 'none';
  }
  function _setLyricsBtnActive(active) {
    const btn = document.getElementById('btn-lyrics');
    if (btn) btn.classList.toggle('active', active);
  }
  function _playerToggleLyrics() {
    const jobId = window.Player?.getState()?.currentJob;
    window.Lyrics?.toggle(jobId);
  }
</script>
</body>
</html>
