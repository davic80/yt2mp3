services:

  app:
    image: ghcr.io/davic80/yt2mp3:${IMAGE_TAG:-latest}
    container_name: yt2mp3-app
    volumes:
      - ./downloads:/app/downloads
      - ./database:/app/database
      - ./geoip:/app/geoip:ro
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - RATE_LIMIT_PER_HOUR=${RATE_LIMIT_PER_HOUR:-10}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-3}
      - DOWNLOAD_DIR=/app/downloads
      - SITE_URL=${SITE_URL:-https://yt2mp3.f1madrid.win}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - APP_VERSION=${APP_VERSION:-4.9.1}
      - ADMIN_REFRESH_INTERVAL=${ADMIN_REFRESH_INTERVAL:-300}
      - GEOIP_PATH=${GEOIP_PATH:-/app/geoip/GeoLite2-City.mmdb}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-https://yt2mp3.f1madrid.win/auth/callback}
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: yt2mp3-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      app:
        condition: service_healthy

networks:
  internal:
    driver: bridge
